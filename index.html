<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Картотека рассылки</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F2F4F6;
    --card: #FFFFFF;
    --ink: #16233A;
    --ink-soft: #647089;
    --border: #E2E6EC;
    --accent: #1C4E80;
    --accent-soft: #E4ECF4;
    --stamp: #B23A2E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Sans', -apple-system, sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'IBM Plex Mono', monospace;}
  #app{max-width:520px;margin:0 auto;padding:26px 16px 40px;}

  .head{position:relative; margin-bottom:22px;}
  .head h1{font-size:21px;margin:0;font-weight:700;letter-spacing:-0.01em;}
  .head .sub{font-size:12.5px;color:var(--ink-soft);margin-top:4px;}
  .stamp{
    position:absolute; right:0; top:-4px;
    font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:700;
    color:var(--stamp); border:1.5px solid var(--stamp); border-radius:4px;
    padding:4px 8px; letter-spacing:0.14em; transform:rotate(-6deg);
    opacity:0.85; user-select:none;
  }

  .lists{display:flex;flex-direction:column;gap:12px;}
  a.list-card{
    display:flex; align-items:center; gap:14px;
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:18px 16px; text-decoration:none; color:var(--ink);
    transition:transform .08s ease;
  }
  a.list-card:active{transform:scale(0.985); background:#FBFCFD;}
  .tab{
    width:46px; height:54px; flex-shrink:0; border-radius:6px 12px 6px 6px;
    background:var(--accent-soft); border:1px solid var(--border);
    position:relative;
  }
  .tab::before{
    content:''; position:absolute; top:-6px; left:6px;
    width:20px; height:8px; background:var(--accent-soft);
    border:1px solid var(--border); border-bottom:none; border-radius:4px 4px 0 0;
  }
  .tab span{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:13px; color:var(--accent);
  }
  .list-card .txt{flex:1; min-width:0;}
  .list-card .title{font-weight:700; font-size:16px;}
  .list-card .desc{font-size:12.5px; color:var(--ink-soft); margin-top:3px;}
  .list-card .go{
    font-family:'IBM Plex Mono',monospace; color:var(--accent); font-size:18px; flex-shrink:0;
  }

  .foot{
    margin-top:26px; font-size:11.5px; color:var(--ink-soft); line-height:1.55;
    border-top:1px dashed var(--border); padding-top:14px;
  }
  .foot .k{font-family:'IBM Plex Mono',monospace; color:var(--ink); font-weight:600;}
</style>
</head>
<body>
<div id="app">
  <div class="head">
    <h1>Картотека рассылки</h1>
    <div class="sub mono" id="today"></div>
    <div class="stamp">КАРТОТЕКА</div>
  </div>

  <div class="lists">
    <a class="list-card" href="brokery.html">
      <div class="tab"><span>БР</span></div>
      <div class="txt">
        <div class="title">Брокеры</div>
        <div class="desc">Коллеги-брокеры · офферы и ответы</div>
      </div>
      <div class="go">&rarr;</div>
    </a>

    <a class="list-card" href="avtosalony.html">
      <div class="tab"><span>АС</span></div>
      <div class="txt">
        <div class="title">Автосалоны</div>
        <div class="desc">Заказчики · офферы и ответы</div>
      </div>
      <div class="go">&rarr;</div>
    </a>
  </div>

  <div class="foot">
    Данные каждого списка хранятся в облаке Телеграма и доступны с телефона и компьютера.
    Кнопка <span class="k">&#8645;</span> внутри списка &mdash; перенос данных (выгрузка и загрузка).
  </div>
</div>
<script>
(function(){
  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg){
    try { tg.ready(); tg.expand(); tg.BackButton.hide(); } catch(e){}
  }
  var days = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  var d = new Date();
  var dd = String(d.getDate()).padStart(2,'0');
  var mm = String(d.getMonth()+1).padStart(2,'0');
  document.getElementById('today').textContent = dd + '.' + mm + '.' + d.getFullYear() + ' \u00B7 ' + days[d.getDay()];
})();
</script>
</body>
</html>
