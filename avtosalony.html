<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Трекер: Автосалоны</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
/* ===== Адаптер хранилища: Telegram CloudStorage / localStorage ===== */
(function(){
  var tg = window.Telegram && window.Telegram.WebApp;
  var useCloud = !!(tg && tg.CloudStorage && tg.initData && tg.initData.length > 0);

  if (tg) {
    try { tg.ready(); tg.expand(); } catch(e){}
    try {
      tg.BackButton.show();
      tg.BackButton.onClick(function(){ location.href = 'index.html'; });
    } catch(e){}
  }

  var CHUNK = 1500; /* запас под лимит 4096 символов на ключ */

  function san(k){ return String(k).replace(/[^A-Za-z0-9_-]/g, '_'); }

  function cs(method){
    var args = Array.prototype.slice.call(arguments, 1);
    return new Promise(function(resolve, reject){
      args.push(function(err, val){ if (err) reject(err); else resolve(val); });
      tg.CloudStorage[method].apply(tg.CloudStorage, args);
    });
  }

  /* --- локальное хранилище (резерв и работа вне Телеграма) --- */
  var localApi = {
    get: function(key){
      var v = localStorage.getItem('st_' + key);
      return Promise.resolve(v === null ? null : { key: key, value: v, shared: false });
    },
    set: function(key, value){
      localStorage.setItem('st_' + key, String(value));
      return Promise.resolve({ key: key, value: String(value), shared: false });
    },
    "delete": function(key){
      localStorage.removeItem('st_' + key);
      return Promise.resolve({ key: key, deleted: true, shared: false });
    },
    list: function(prefix){
      var keys = [];
      for (var i = 0; i < localStorage.length; i++){
        var k = localStorage.key(i);
        if (k && k.indexOf('st_') === 0){
          var ok = k.slice(3);
          if (!prefix || ok.indexOf(prefix) === 0) keys.push(ok);
        }
      }
      return Promise.resolve({ keys: keys, shared: false });
    }
  };

  /* --- облако Телеграма с разбиением на части --- */
  var cloudApi = {
    get: async function(key){
      var s = san(key);
      var metaObj = await cs('getItems', ['m_' + s]);
      var meta = metaObj['m_' + s];
      if (!meta){
        /* в облаке пусто — пробуем локальную копию */
        return localApi.get(key);
      }
      var n = parseInt(meta, 10) || 1;
      var keys = [];
      for (var i = 0; i < n; i++) keys.push('c_' + s + '_' + i);
      var parts = await cs('getItems', keys);
      var out = '';
      for (var j = 0; j < n; j++) out += (parts['c_' + s + '_' + j] || '');
      return { key: key, value: out, shared: false };
    },
    set: async function(key, value){
      var s = san(key);
      value = String(value);
      var n = Math.max(1, Math.ceil(value.length / CHUNK));
      var old = 0;
      try {
        var mo = await cs('getItems', ['m_' + s]);
        old = parseInt(mo['m_' + s], 10) || 0;
      } catch(e){}
      for (var i = 0; i < n; i++){
        await cs('setItem', 'c_' + s + '_' + i, value.substr(i * CHUNK, CHUNK));
      }
      await cs('setItem', 'm_' + s, n + '|' + key);
      if (old > n){
        var rm = [];
        for (var j = n; j < old; j++) rm.push('c_' + s + '_' + j);
        try { await cs('removeItems', rm); } catch(e){}
      }
      /* локальная резервная копия */
      try { localStorage.setItem('st_' + key, value); } catch(e){}
      return { key: key, value: value, shared: false };
    },
    "delete": async function(key){
      var s = san(key);
      var mo = await cs('getItems', ['m_' + s]);
      var n = parseInt(mo['m_' + s], 10) || 0;
      var rm = ['m_' + s];
      for (var i = 0; i < n; i++) rm.push('c_' + s + '_' + i);
      await cs('removeItems', rm);
      try { localStorage.removeItem('st_' + key); } catch(e){}
      return { key: key, deleted: true, shared: false };
    },
    list: async function(prefix){
      var all = await cs('getKeys');
      var metas = [];
      for (var i = 0; i < all.length; i++){
        if (all[i].indexOf('m_') === 0) metas.push(all[i]);
      }
      var keys = [];
      if (metas.length){
        var vals = await cs('getItems', metas);
        for (var k in vals){
          var v = vals[k] || '';
          var p = v.indexOf('|');
          var orig = p >= 0 ? v.slice(p + 1) : k.slice(2);
          if (!prefix || orig.indexOf(prefix) === 0) keys.push(orig);
        }
      }
      return { keys: keys, shared: false };
    }
  };

  if (!window.storage){
    window.storage = useCloud ? cloudApi : localApi;
  }

  /* ===== Панель: перенос данных (экспорт / импорт) ===== */
  function buildPanel(){
    var css = document.createElement('style');
    css.textContent =
      '#syncBtn{position:fixed;left:12px;bottom:12px;z-index:9998;width:40px;height:40px;border-radius:50%;' +
      'border:1px solid #E2E6EC;background:#fff;color:#1C4E80;font-size:17px;cursor:pointer;' +
      'box-shadow:0 2px 8px rgba(22,35,58,.12);display:flex;align-items:center;justify-content:center;}' +
      '#syncOverlay{position:fixed;inset:0;background:rgba(22,35,58,.45);z-index:9999;display:none;' +
      'align-items:flex-end;justify-content:center;}' +
      '#syncOverlay.open{display:flex;}' +
      '#syncPanel{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:520px;padding:16px;' +
      'font-family:"IBM Plex Sans",-apple-system,sans-serif;color:#16233A;}' +
      '#syncPanel h3{margin:0 0 10px;font-size:15px;}' +
      '#syncPanel textarea{width:100%;height:130px;border:1px solid #E2E6EC;border-radius:10px;padding:9px;' +
      'font-family:"IBM Plex Mono",monospace;font-size:11px;box-sizing:border-box;resize:vertical;}' +
      '#syncPanel .row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}' +
      '#syncPanel button{flex:1;min-width:120px;padding:10px;border-radius:10px;border:1px solid #E2E6EC;' +
      'background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#16233A;}' +
      '#syncPanel button.primary{background:#1C4E80;color:#fff;border-color:#1C4E80;}' +
      '#syncPanel .home{display:block;text-align:center;margin-top:12px;font-size:13px;color:#1C4E80;' +
      'text-decoration:none;font-weight:600;}' +
      '#syncPanel .hint{font-size:11.5px;color:#647089;margin:6px 0 0;}';
    document.head.appendChild(css);

    var btn = document.createElement('button');
    btn.id = 'syncBtn';
    btn.type = 'button';
    btn.title = 'Данные';
    btn.textContent = '\u21C5';
    document.body.appendChild(btn);

    var overlay = document.createElement('div');
    overlay.id = 'syncOverlay';
    overlay.innerHTML =
      '<div id="syncPanel">' +
        '<h3>Перенос данных</h3>' +
        '<textarea id="syncArea" placeholder="Здесь появятся данные при выгрузке. Для загрузки — вставьте сюда данные и нажмите \u00ABЗагрузить\u00BB."></textarea>' +
        '<div class="row">' +
          '<button type="button" id="syncExport">Выгрузить данные</button>' +
          '<button type="button" id="syncImport" class="primary">Загрузить данные</button>' +
        '</div>' +
        '<div class="row"><button type="button" id="syncClose">Закрыть</button></div>' +
        '<p class="hint" id="syncHint">Хранилище: ' + (useCloud ? 'облако Телеграма' : 'память браузера') + '</p>' +
        '<a class="home" href="index.html">\u2190 К выбору списка</a>' +
      '</div>';
    document.body.appendChild(overlay);

    var area = overlay.querySelector('#syncArea');
    var hint = overlay.querySelector('#syncHint');

    btn.addEventListener('click', function(){ overlay.classList.add('open'); });
    overlay.querySelector('#syncClose').addEventListener('click', function(){ overlay.classList.remove('open'); });
    overlay.addEventListener('click', function(e){ if (e.target === overlay) overlay.classList.remove('open'); });

    overlay.querySelector('#syncExport').addEventListener('click', function(){
      window.storage.list('').then(function(res){
        var keys = (res && res.keys) || [];
        if (!keys.length){ area.value = '{}'; hint.textContent = 'Данных пока нет.'; return; }
        var dump = {};
        var chain = Promise.resolve();
        keys.forEach(function(k){
          chain = chain.then(function(){
            return window.storage.get(k).then(function(r){ if (r) dump[k] = r.value; });
          });
        });
        chain.then(function(){
          area.value = JSON.stringify(dump);
          area.select();
          try { document.execCommand('copy'); hint.textContent = 'Данные выгружены и скопированы в буфер.'; }
          catch(e){ hint.textContent = 'Данные выгружены — скопируйте текст вручную.'; }
        });
      });
    });

    overlay.querySelector('#syncImport').addEventListener('click', function(){
      var txt = area.value.trim();
      if (!txt){ hint.textContent = 'Поле пустое — вставьте данные для загрузки.'; return; }
      var data;
      try { data = JSON.parse(txt); }
      catch(e){ hint.textContent = 'Не удалось прочитать данные: проверьте, что вставлен весь текст целиком.'; return; }
      var keys = Object.keys(data);
      if (!keys.length){ hint.textContent = 'В данных нет записей.'; return; }
      hint.textContent = 'Загружаю\u2026';
      var chain = Promise.resolve();
      keys.forEach(function(k){
        chain = chain.then(function(){ return window.storage.set(k, data[k]); });
      });
      chain.then(function(){
        hint.textContent = 'Готово. Обновляю страницу\u2026';
        setTimeout(function(){ location.reload(); }, 600);
      }).catch(function(){
        hint.textContent = 'Часть данных не загрузилась — попробуйте ещё раз.';
      });
    });
  }

  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', buildPanel);
  } else {
    buildPanel();
  }
})();

</script>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F2F4F6;
    --card: #FFFFFF;
    --ink: #16233A;
    --ink-soft: #647089;
    --border: #E2E6EC;
    --accent: #2A6F63;
    --accent-soft: #E1EEEA;
    --stamp: #B23A2E;
    --good: #2F8F5B;
    --good-soft: #E4F3EA;
    --amber: #C9862B;
    --amber-soft: #FBF0DF;
    --purple: #6A4FB3;
    --purple-soft: #ECE7F8;
    --gray: #8A8F99;
    --gray-soft: #ECEDEF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'IBM Plex Sans', -apple-system, sans-serif;
    min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'IBM Plex Mono', monospace;}
  #app{max-width:520px;margin:0 auto;padding:16px 14px 90px;}

  header.top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  header.top h1{ font-size:18px; margin:0; font-weight:700; letter-spacing:-0.01em; }
  header.top .sub{ font-size:11.5px; color:var(--ink-soft); margin-top:2px; }
  .badge-total{
    font-family:'IBM Plex Mono', monospace; font-size:11px; background:var(--accent-soft); color:var(--accent);
    padding:4px 9px; border-radius:20px; font-weight:600; white-space:nowrap;
  }

  .tabbar{ display:flex; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:3px; margin-bottom:14px; }
  .tabbar button{
    flex:1; border:none; background:none; padding:9px 4px; font-size:13px; font-weight:600;
    color:var(--ink-soft); border-radius:9px; cursor:pointer; font-family:'IBM Plex Sans',sans-serif;
  }
  .tabbar button.active{ background:var(--accent); color:#fff; }

  .view{ display:none; }
  .view.active{ display:block; }

  /* --- day view --- */
  .daynav{ display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:10px 12px; margin-bottom:12px; }
  .queue-toggle{ display:flex; gap:8px; margin-bottom:10px; }
  .qt-btn{
    flex:1; border:1.5px solid var(--border); background:var(--card); color:var(--ink-soft);
    border-radius:12px; padding:12px 8px; font-size:13px; font-weight:700; cursor:pointer;
    font-family:'IBM Plex Sans',sans-serif; display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .qt-btn .mono{ font-size:11.5px; opacity:.85; }
  .qt-btn.active{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .substatus-row{ margin-bottom:12px; }
  .substatus-row .status-select{ width:100%; }
  .daynav button.arrow{ width:34px; height:34px; border-radius:10px; border:1px solid var(--border); background:#fff; color:var(--ink); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .daynav button.arrow:active{ background:var(--bg); }
  .daynav .center{ flex:1; text-align:center; }
  .daynav .daylabel{ font-weight:700; font-size:14px; }
  .daynav .datelabel{ font-size:11.5px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace; margin-top:1px;}
  .daynav .today-btn{ font-size:11px; font-family:'IBM Plex Mono',monospace; color:var(--accent); background:var(--accent-soft); border:none; border-radius:8px; padding:6px 8px; cursor:pointer; font-weight:600; flex-shrink:0; }

  .progress-wrap{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding:12px 14px; margin-bottom:14px; }
  .progress-row{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:7px;}
  .progress-row .label{ font-size:12.5px; color:var(--ink-soft); }
  .progress-row .count{ font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:13px; }
  .bar{ height:7px; background:var(--bg); border-radius:5px; overflow:hidden; }
  .bar-fill{ height:100%; background:var(--accent); border-radius:5px; transition:width .3s ease; }
  .day-jump{ display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace; margin-top:6px; }
  .day-jump input{ width:52px; border:1px solid var(--border); border-radius:7px; padding:4px 6px; font-family:'IBM Plex Mono',monospace; font-size:12px; text-align:center; }

  .cards{ display:flex; flex-direction:column; gap:12px; }
  .card{ position:relative; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:14px 14px 12px; overflow:hidden; }
  .card.card-dim{ opacity:.55; }
  .card-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:8px;}
  .seller{ font-weight:700; font-size:15px; line-height:1.25; }
  .meta{ font-size:12px; color:var(--ink-soft); margin-top:2px; }
  .views{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); background:var(--bg); border-radius:8px; padding:3px 7px; white-space:nowrap; flex-shrink:0; }
  .offer-tag{ display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--accent); background:var(--accent-soft); padding:3px 8px; border-radius:7px; font-weight:600; margin-bottom:10px; letter-spacing:.02em; }
  .btn-row{ display:flex; gap:8px; margin-top:2px; }
  .btn{ flex:1; text-align:center; text-decoration:none; border:none; cursor:pointer; border-radius:10px; padding:10px 8px; font-size:13px; font-weight:600; font-family:'IBM Plex Sans',sans-serif; display:flex; align-items:center; justify-content:center; gap:5px; }
  .btn-open{ background:var(--accent); color:#fff; }
  .btn-open:active{ opacity:.85; }
  .btn-copy{ background:var(--bg); color:var(--ink); border:1px solid var(--border); }
  .btn-copy:active{ background:#e9ebef; }

  .texttype-row{ display:flex; gap:8px; margin-top:10px; }
  select.texttype-select{
    flex:1.3; appearance:none; -webkit-appearance:none; border-radius:10px; border:1.5px solid var(--border);
    padding:9px 30px 9px 10px; font-size:12.5px; font-weight:600; font-family:'IBM Plex Sans',sans-serif;
    background:#fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path d="M0 0l5 6 5-6z" fill="%23647089"/></svg>') no-repeat right 10px center;
    color:var(--ink);
  }
  .btn-copytext{ flex:1; background:var(--accent); color:#fff; border:none; border-radius:10px; padding:9px 8px; font-size:12.5px; font-weight:700; cursor:pointer; font-family:'IBM Plex Sans',sans-serif; }
  .btn-copytext:active{ opacity:.85; }

  .call-row{ display:flex; gap:8px; margin-top:8px; }
  .btn-call{
    width:100%; background:#fff; color:var(--purple); border:1.5px solid var(--purple);
    border-radius:10px; padding:9px; font-size:12.5px; font-weight:700; cursor:pointer; font-family:'IBM Plex Sans',sans-serif;
  }
  .btn-call.active{ background:var(--purple); color:#fff; }
  .btn-call:active{ opacity:.85; }
  .called-note{ font-size:10.5px; color:var(--purple); margin-top:5px; font-family:'IBM Plex Mono',monospace; }

  .script-step{ border-top:1px solid var(--border); padding:12px 0; font-size:13px; line-height:1.5; }
  .script-step .ss-label{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--purple); font-weight:700; margin-bottom:5px; text-transform:uppercase; letter-spacing:.03em; }
  .script-step .oi-copy{ margin-top:8px; font-size:12px; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:6px 10px; cursor:pointer; font-family:'IBM Plex Sans',sans-serif; font-weight:600; }
  .ref-subhead{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--ink-soft); font-weight:700; text-transform:uppercase; letter-spacing:.04em; padding-top:12px; }

  .status-row{ display:flex; gap:8px; margin-top:10px; }
  select.status-select{
    flex:1; appearance:none; -webkit-appearance:none; border-radius:10px; border:1.5px solid var(--border);
    padding:9px 30px 9px 10px; font-size:13px; font-weight:600; font-family:'IBM Plex Sans',sans-serif;
    background:#fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path d="M0 0l5 6 5-6z" fill="%23647089"/></svg>') no-repeat right 10px center;
    color:var(--ink);
  }
  input.note-input{
    width:100%; margin-top:8px; border:1px solid var(--border); border-radius:10px; padding:9px 10px;
    font-size:12.5px; font-family:'IBM Plex Sans',sans-serif; color:var(--ink);
  }
  .updated-note{ font-size:10.5px; color:var(--ink-soft); margin-top:5px; font-family:'IBM Plex Mono',monospace;}

  .stamp{ position:absolute; top:8px; right:10px; transform:rotate(-9deg); border:2.5px solid var(--stamp); color:var(--stamp); font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:10px; letter-spacing:.04em; padding:3px 8px; border-radius:6px; background:rgba(255,255,255,.92); pointer-events:none; }

  .empty{ text-align:center; padding:50px 20px; color:var(--ink-soft); background:var(--card); border:1px solid var(--border); border-radius:16px; }
  .empty .big{ font-size:34px; margin-bottom:8px; }

  details.offers-ref{ margin-top:18px; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:2px 14px; }
  details.offers-ref summary{ cursor:pointer; padding:12px 0; font-weight:600; font-size:13.5px; list-style:none; display:flex; justify-content:space-between; align-items:center; }
  details.offers-ref summary::-webkit-details-marker{ display:none; }
  .offer-item{ border-top:1px solid var(--border); padding:12px 0; font-size:13px; line-height:1.5; }
  .offer-item .oi-label{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--accent); font-weight:700; margin-bottom:5px; }
  .offer-item .oi-copy{ margin-top:8px; font-size:12px; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:6px 10px; cursor:pointer; font-family:'IBM Plex Sans',sans-serif; font-weight:600; }

  .toast{ position:fixed; left:50%; bottom:22px; transform:translate(-50%, 20px); background:var(--ink); color:#fff; padding:10px 18px; border-radius:24px; font-size:13px; opacity:0; transition:all .25s ease; pointer-events:none; z-index:50; font-weight:500; }
  .toast.show{ opacity:1; transform:translate(-50%,0); }

  /* --- CRM view --- */
  .search-wrap{ margin-bottom:10px; }
  input.search-input{
    width:100%; border:1px solid var(--border); border-radius:12px; padding:11px 14px; font-size:13.5px;
    font-family:'IBM Plex Sans',sans-serif; background:var(--card);
  }
  .chips{ display:flex; gap:6px; overflow-x:auto; padding-bottom:8px; margin-bottom:10px; -webkit-overflow-scrolling:touch; }
  .chips::-webkit-scrollbar{ display:none; }
  .chip{
    flex-shrink:0; font-size:12px; font-weight:600; padding:7px 12px; border-radius:20px; border:1.5px solid var(--border);
    background:var(--card); color:var(--ink-soft); cursor:pointer; white-space:nowrap; font-family:'IBM Plex Sans',sans-serif;
  }
  .chip.active{ background:var(--ink); border-color:var(--ink); color:#fff; }

  .crm-list{ display:flex; flex-direction:column; gap:8px; }
  details.crm-row{ background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
  details.crm-row summary{
    list-style:none; padding:12px 14px; cursor:pointer; display:flex; align-items:center; gap:10px;
  }

function clamp(n, lo, hi){ return Math.max(lo, Math.min(hi, n)); }
function timeAgo(iso){
  if(!iso) return '';
  const diffMs = Date.now() - new Date(iso).getTime();
  const days = Math.floor(diffMs / 86400000);
  if(days <= 0) return 'сегодня';
  if(days === 1) return 'вчера';
  return `${days} дн. назад`;
}
function getEntry(id){
  const raw = statusMap[id];
  if(!raw) return { status:'new', note:'', updatedAt:null, calledAt:null };
  if(typeof raw === 'string') return { status:'sent', note:'', updatedAt: raw, calledAt:null };
  return { status: raw.status || 'new', note: raw.note || '', updatedAt: raw.updatedAt || null, calledAt: raw.calledAt || null };
}
function setEntry(id, patch, touchUpdatedAt = true){
  const cur = getEntry(id);
  const next = { ...cur, ...patch };
  if(touchUpdatedAt) next.updatedAt = new Date().toISOString();
  if(next.status === 'new' && !next.note && !next.calledAt){ delete statusMap[id]; }
  else statusMap[id] = next;
  saveStatus();
}
function toggleCalled(id){
  const cur = getEntry(id);
  setEntry(id, { calledAt: cur.calledAt ? null : new Date().toISOString() }, false);
}

async function loadStatus(){
  try{ const res = await window.storage.get(STORAGE_KEY, false); if(res && res.value) statusMap = JSON.parse(res.value); }
  catch(e){ statusMap = {}; }
}
async function saveStatus(){
  try{ await window.storage.set(STORAGE_KEY, JSON.stringify(statusMap), false); }catch(e){}
}

function showToast(msg){
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1400);
}
function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast('Текст скопирован')).catch(()=>fallbackCopy(text));
  } else fallbackCopy(text);
}
function fallbackCopy(text){
  const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); showToast('Текст скопирован'); }catch(e){}
  document.body.removeChild(ta);
}

function statusOptionsHTML(selected){

  const newCount = DATA.filter(d => getEntry(d.id).status === 'new').length;
  const sentCount = DATA.filter(d => ACTIVE_STATUSES.includes(getEntry(d.id).status)).length;
  const otherCount = DATA.filter(d => RESOLVED_STATUSES.includes(getEntry(d.id).status)).length;
  const elNew = document.getElementById('qtNewCount');
  const elSent = document.getElementById('qtSentCount');
  const elOther = document.getElementById('qtOtherCount');
  if(elNew) elNew.textContent = newCount;
  if(elSent) elSent.textContent = sentCount;
  if(elOther) elOther.textContent = otherCount;
}

/* ---------- QUEUE VIEW ---------- */
const STATUS_RANK = { sent:0, replied:0, negotiating:0, won:1, lost:1, irrelevant:1 };

function renderQueue(){
  let items;
  if(queueStatusFilter !== 'all'){
    items = DATA.filter(d => getEntry(d.id).status === queueStatusFilter);
  } else if(queueMode === 'new'){
    items = DATA.filter(d => getEntry(d.id).status === 'new');
  } else if(queueMode === 'sent'){
    items = DATA.filter(d => ACTIVE_STATUSES.includes(getEntry(d.id).status));
  } else {
    items = DATA.filter(d => RESOLVED_STATUSES.includes(getEntry(d.id).status));
  }

  if(queueMode !== 'new'){
    items = items.slice().sort((a, b) => {
      const ea = getEntry(a.id), eb = getEntry(b.id);
      const ra = STATUS_RANK[ea.status] ?? 0, rb = STATUS_RANK[eb.status] ?? 0;
      if(ra !== rb) return ra - rb;
      const ta = ea.updatedAt ? new Date(ea.updatedAt).getTime() : 0;
      const tb = eb.updatedAt ? new Date(eb.updatedAt).getTime() : 0;
      return tb - ta;
    });
  }

  document.getElementById('qtNew').classList.toggle('active', queueMode==='new');
  document.getElementById('qtSent').classList.toggle('active', queueMode==='sent');
  document.getElementById('qtOther').classList.toggle('active', queueMode==='other');

  const cardsEl = document.getElementById('cards');
  const emptyEl = document.getElementById('emptyState');
  cardsEl.innerHTML = '';

  if(items.length === 0){
    emptyEl.style.display = 'block';
  } else {
    emptyEl.style.display = 'none';
    items.forEach(item => {
      const entry = getEntry(item.id);
      const meta = STATUS_META[entry.status];
      const card = document.createElement('div');
      card.className = 'card' + (RESOLVED_STATUSES.includes(entry.status) ? ' card-dim' : '');
      const metaParts = [item.city || item.region].filter(Boolean);
      if(item.contact) metaParts.push(item.contact);
      card.innerHTML = `
        ${meta.short ? `<div class="stamp">${meta.short}</div>` : ''}
        <div class="card-top">
          <div>
            <div class="seller">${item.seller || 'Без имени'}</div>
            <div class="meta">${metaParts.join(' · ')}</div>
          </div>
          <div class="views">👁 ${item.views.toLocaleString('ru-RU')}</div>
        </div>
        <div class="offer-tag">ОФФЕР №${item.offerIdx + 1}</div>
        <div class="btn-row">
          <a class="btn btn-open" href="${item.link}" target="_blank" rel="noopener">Объявление ↗</a>
        </div>
        <div class="texttype-row">
          <select class="texttype-select" data-id="${item.id}" data-offer="${item.offerIdx}">${textTypeOptionsHTML()}</select>
          <button class="btn-copytext" data-id="${item.id}" data-offer="${item.offerIdx}">Копировать</button>
        </div>
        <div class="call-row">
          <button class="btn-call ${entry.calledAt ? 'active' : ''}" data-id="${item.id}">${entry.calledAt ? '📞 Звонили' : '📞 Отметить звонок'}</button>
        </div>
        ${entry.calledAt ? `<div class="called-note">звонок: ${timeAgo(entry.calledAt)}</div>` : ''}
        <div class="status-row">
          <select class="status-select" data-id="${item.id}">${statusOptionsHTML(entry.status)}</select>
        </div>
        <input type="text" class="note-input" data-id="${item.id}" placeholder="Заметка (необязательно)" value="${entry.note.replace(/"/g,'&quot;')}">
        ${entry.updatedAt ? `<div class="updated-note">обновлено: ${timeAgo(entry.updatedAt)}</div>` : ''}
      `;
      cardsEl.appendChild(card);
    });
  }

  renderOverallBadge();

  cardsEl.querySelectorAll('.btn-copytext').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const sel = cardsEl.querySelector(`.texttype-select[data-id="${btn.getAttribute('data-id')}"]`);
      const offerIdx = parseInt(btn.getAttribute('data-offer'));
      copyText(textForType(sel.value, offerIdx));
    });
  });
  cardsEl.querySelectorAll('.btn-call').forEach(btn=>{
    btn.addEventListener('click', ()=>{ toggleCalled(btn.getAttribute('data-id')); renderQueue(); if(currentTab==='crm') renderCRM(); });
  });
  cardsEl.querySelectorAll('.status-select').forEach(sel=>{
    sel.addEventListener('change', ()=>{ setEntry(sel.getAttribute('data-id'), { status: sel.value }); renderQueue(); if(currentTab==='crm') renderCRM(); });
  });
  cardsEl.querySelectorAll('.note-input').forEach(inp=>{
    inp.addEventListener('change', ()=>{ setEntry(inp.getAttribute('data-id'), { note: inp.value }); renderOverallBadge(); });
  });
}

function textTypeOptionsHTML(){
  return TEXT_TYPES.map(t => `<option value="${t.key}">${t.label}</option>`).join('');
}
function textForType(typeKey, offerIdx){
  const t = TEXT_TYPES.find(x => x.key === typeKey);
  const list = t.list;
  return list[offerIdx % list.length];
}

function renderOffersRef(){
  const el = document.getElementById('offersRef');
  el.innerHTML = TEXT_TYPES.map(t => `
    <div class="ref-subhead">${t.label}</div>
    ${t.list.map((text, i) => `
      <div class="offer-item">
        <div class="oi-label">№${i+1}</div>
        <div>${text}</div>
        <button class="oi-copy" data-key="${t.key}" data-idx="${i}">Копировать</button>
      </div>
    `).join('')}
  `).join('');
  el.querySelectorAll('.oi-copy').forEach(btn=>{
    btn.addEventListener('click', ()=> copyText(textForType(btn.getAttribute('data-key'), parseInt(btn.getAttribute('data-idx')))));
  });
}

function renderCallScript(){
  const el = document.getElementById('callScriptRef');
  el.innerHTML = CALL_SCRIPT.map(step => `
    <div class="script-step">
      <div class="ss-label">${step.label}</div>
      <div>${step.text}</div>
      <button class="oi-copy" data-text="${encodeURIComponent(step.text)}">Копировать</button>
    </div>
  `).join('');
  el.querySelectorAll('.oi-copy').forEach(btn=>{
    btn.addEventListener('click', ()=> copyText(decodeURIComponent(btn.getAttribute('data-text'))));
  });
}

/* ---------- CRM VIEW ---------- */
function computeCounts(){
  const counts = { all: DATA.length, new:0, sent:0, replied:0, negotiating:0, won:0, lost:0, irrelevant:0 };
  DATA.forEach(item => { counts[getEntry(item.id).status]++; });
  return counts;
}

function renderChips(){
  const counts = computeCounts();
  const chipsEl = document.getElementById('chips');
  const defs = [
    ['all','Все'], ['replied','Ответил'], ['negotiating','Переговоры'], ['won','Договорились'],
    ['sent','Написано'], ['new','Не написано'], ['lost','Отказ'], ['irrelevant','Отмена']
  ];
  chipsEl.innerHTML = defs.map(([key,label]) => `
    <button class="chip ${activeFilter===key?'active':''}" data-key="${key}">${label} (${counts[key]})</button>
  `).join('');
  chipsEl.querySelectorAll('.chip').forEach(ch=>{
    ch.addEventListener('click', ()=>{ activeFilter = ch.getAttribute('data-key'); renderCRM(); });
  });
}

function renderCRM(){
  renderChips();
  const term = searchTerm.trim().toLowerCase();
  let items = DATA.filter(item => {
    const entry = getEntry(item.id);
    if(activeFilter !== 'all' && entry.status !== activeFilter) return false;
    if(term){
      const hay = `${item.seller} ${item.city} ${item.region}`.toLowerCase();
      if(!hay.includes(term)) return false;
    }
    return true;
  });
  items = items.slice().sort((a,b) => a.day - b.day);

  const listEl = document.getElementById('crmList');
  const emptyEl = document.getElementById('crmEmpty');
  listEl.innerHTML = '';

  if(items.length === 0){ emptyEl.style.display = 'block'; return; }
  emptyEl.style.display = 'none';

  items.forEach(item => {
    const entry = getEntry(item.id);
    const meta = STATUS_META[entry.status];
    const det = document.createElement('details');
    det.className = 'crm-row';
    const metaParts = [`День ${item.day}`, item.city || item.region].filter(Boolean);
    det.innerHTML = `
      <summary>
        <div class="dot status-dot-${entry.status}"></div>
        <div class="crm-row-main">
          <div class="crm-row-seller">${item.seller || 'Без имени'}</div>
          <div class="crm-row-meta">${metaParts.join(' · ')}${entry.updatedAt ? ' · ' + timeAgo(entry.updatedAt) : ''}</div>
        </div>
        <div class="crm-row-badge ${meta.badge}">${entry.status==='new' ? '—' : meta.label.toUpperCase()}</div>
      </summary>
      <div class="crm-detail">
        <div class="offer-tag">ОФФЕР №${item.offerIdx + 1}</div>
        <div class="btn-row">
          <a class="btn btn-open" href="${item.link}" target="_blank" rel="noopener">Объявление ↗</a>
        </div>
        <div class="texttype-row">
          <select class="texttype-select" data-id="${item.id}" data-offer="${item.offerIdx}">${textTypeOptionsHTML()}</select>
          <button class="btn-copytext" data-id="${item.id}" data-offer="${item.offerIdx}">Копировать</button>
        </div>
        <div class="call-row">
          <button class="btn-call ${entry.calledAt ? 'active' : ''}" data-id="${item.id}">${entry.calledAt ? '📞 Звонили' : '📞 Отметить звонок'}</button>
        </div>
        ${entry.calledAt ? `<div class="called-note">звонок: ${timeAgo(entry.calledAt)}</div>` : ''}
        <div class="status-row">
          <select class="status-select" data-id="${item.id}">${statusOptionsHTML(entry.status)}</select>
        </div>
        <input type="text" class="note-input" data-id="${item.id}" placeholder="Заметка (необязательно)" value="${entry.note.replace(/"/g,'&quot;')}">
      </div>
    `;
    listEl.appendChild(det);
  });

  listEl.querySelectorAll('.btn-copytext').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.preventDefault();
      const sel = listEl.querySelector(`.texttype-select[data-id="${btn.getAttribute('data-id')}"]`);
      const offerIdx = parseInt(btn.getAttribute('data-offer'));
      copyText(textForType(sel.value, offerIdx));
    });
  });
  listEl.querySelectorAll('.texttype-select').forEach(sel=>{
    sel.addEventListener('click', e=>e.stopPropagation());
  });
  listEl.querySelectorAll('.btn-call').forEach(btn=>{
    btn.addEventListener('click', (e)=>{ e.preventDefault(); toggleCalled(btn.getAttribute('data-id')); renderCRM(); });
  });
  listEl.querySelectorAll('.status-select').forEach(sel=>{
    sel.addEventListener('click', e=>e.stopPropagation());
    sel.addEventListener('change', ()=>{ setEntry(sel.getAttribute('data-id'), { status: sel.value }); renderCRM(); renderOverallBadge(); });
  });
  listEl.querySelectorAll('.note-input').forEach(inp=>{
    inp.addEventListener('click', e=>e.stopPropagation());
    inp.addEventListener('change', ()=>{ setEntry(inp.getAttribute('data-id'), { note: inp.value }); });
  });
}

/* ---------- NAV / INIT ---------- */
document.querySelectorAll('.tabbar button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    currentTab = btn.getAttribute('data-tab');
    document.querySelectorAll('.tabbar button').forEach(b=>b.classList.toggle('active', b===btn));
    document.getElementById('view-day').classList.toggle('active', currentTab==='day');
    document.getElementById('view-crm').classList.toggle('active', currentTab==='crm');
    if(currentTab==='crm') renderCRM();
    else renderQueue();
  });
});

document.getElementById('qtNew').addEventListener('click', ()=>{ queueMode = 'new'; queueStatusFilter = 'all'; document.getElementById('substatusSelect').value = 'all'; renderQueue(); });
document.getElementById('qtSent').addEventListener('click', ()=>{ queueMode = 'sent'; queueStatusFilter = 'all'; document.getElementById('substatusSelect').value = 'all'; renderQueue(); });
document.getElementById('qtOther').addEventListener('click', ()=>{ queueMode = 'other'; queueStatusFilter = 'all'; document.getElementById('substatusSelect').value = 'all'; renderQueue(); });
document.getElementById('substatusSelect').addEventListener('change', (e)=>{
  const val = e.target.value;
  queueStatusFilter = val;
  if(val !== 'all') queueMode = STATUS_TO_BUCKET[val];
  renderQueue();
});
document.getElementById('searchInput').addEventListener('input', (e)=>{ searchTerm = e.target.value; renderCRM(); });

(async function init(){
  await loadStatus();
  renderQueue();
  renderOffersRef();
  renderCallScript();
  renderOverallBadge();
})();
</script>
</body>
</html>
