<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Трекер: Telegram</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
/* ===== Адаптер хранилища: Telegram CloudStorage / localStorage ===== */
(function(){
  var tg = window.Telegram && window.Telegram.WebApp;
  var hasCS = !!(tg && tg.CloudStorage);
  var hasInit = !!(tg && tg.initData && tg.initData.length > 0);
  var useCloud = hasCS && hasInit;

  if (tg) {
    try { tg.ready(); tg.expand(); } catch(e){}
    try {
      tg.BackButton.show();
      tg.BackButton.onClick(function(){ location.href = 'index.html'; });
    } catch(e){}
  }

  var CHUNK = 1500; /* запас под лимит 4096 символов на ключ */

  function san(k){ return String(k).replace(/[^A-Za-z0-9_-]/g, '_'); }

  function toast(msg, isError){
    try {
      if (typeof window.showToast === 'function'){ window.showToast(msg); return; }
    } catch(e){}
    var t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'position:fixed;left:50%;bottom:78px;transform:translateX(-50%);' +
      'background:' + (isError ? '#B23A2E' : '#16233A') + ';color:#fff;padding:9px 15px;border-radius:20px;' +
      'font-size:12.5px;z-index:10000;max-width:88%;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.25);' +
      'font-family:-apple-system,sans-serif;';
    document.body.appendChild(t);
    setTimeout(function(){ t.remove(); }, isError ? 4200 : 2400);
  }

  function cs(method){
    var args = Array.prototype.slice.call(arguments, 1);
    return new Promise(function(resolve, reject){
      args.push(function(err, val){ if (err) reject(err); else resolve(val); });
      tg.CloudStorage[method].apply(tg.CloudStorage, args);
    });
  }

  /* --- локальное хранилище (резерв и работа вне Телеграма) --- */
  var localApi = {
    get: function(key){
      var v = localStorage.getItem('st_' + key);
      return Promise.resolve(v === null ? null : { key: key, value: v, shared: false });
    },
    set: function(key, value){
      localStorage.setItem('st_' + key, String(value));
      return Promise.resolve({ key: key, value: String(value), shared: false });
    },
    "delete": function(key){
      localStorage.removeItem('st_' + key);
      return Promise.resolve({ key: key, deleted: true, shared: false });
    },
    list: function(prefix){
      var keys = [];
      for (var i = 0; i < localStorage.length; i++){
        var k = localStorage.key(i);
        if (k && k.indexOf('st_') === 0){
          var ok = k.slice(3);
          if (!prefix || ok.indexOf(prefix) === 0) keys.push(ok);
        }
      }
      return Promise.resolve({ keys: keys, shared: false });
    }
  };

  /* --- облако Телеграма с разбиением на части --- */
  var cloudApi = {
    get: async function(key){
      var s = san(key);
      var metaObj = await cs('getItems', ['m_' + s]);
      var meta = metaObj['m_' + s];
      if (!meta){
        return localApi.get(key);
      }
      var n = parseInt(meta, 10) || 1;
      var keys = [];
      for (var i = 0; i < n; i++) keys.push('c_' + s + '_' + i);
      var parts = await cs('getItems', keys);
      var out = '';
      for (var j = 0; j < n; j++) out += (parts['c_' + s + '_' + j] || '');
      return { key: key, value: out, shared: false };
    },
    set: async function(key, value){
      try {
        var s = san(key);
        value = String(value);
        var n = Math.max(1, Math.ceil(value.length / CHUNK));
        var old = 0;
        try {
          var mo = await cs('getItems', ['m_' + s]);
          old = parseInt(mo['m_' + s], 10) || 0;
        } catch(e){}
        for (var i = 0; i < n; i++){
          await cs('setItem', 'c_' + s + '_' + i, value.substr(i * CHUNK, CHUNK));
        }
        await cs('setItem', 'm_' + s, n + '|' + key);
        if (old > n){
          var rm = [];
          for (var j = n; j < old; j++) rm.push('c_' + s + '_' + j);
          try { await cs('removeItems', rm); } catch(e){}
        }
        try { localStorage.setItem('st_' + key, value); } catch(e){}
        return { key: key, value: value, shared: false };
      } catch(err){
        try { localStorage.setItem('st_' + key, String(value)); } catch(e){}
        toast('Не сохранилось в облако Телеграма (' + (err && (err.message || err)) + '). Сохранено временно в память браузера.', true);
        throw err;
      }
    },
    "delete": async function(key){
      var s = san(key);
      var mo = await cs('getItems', ['m_' + s]);
      var n = parseInt(mo['m_' + s], 10) || 0;
      var rm = ['m_' + s];
      for (var i = 0; i < n; i++) rm.push('c_' + s + '_' + i);
      await cs('removeItems', rm);
      try { localStorage.removeItem('st_' + key); } catch(e){}
      return { key: key, deleted: true, shared: false };
    },
    list: async function(prefix){
      var all = await cs('getKeys');
      var metas = [];
      for (var i = 0; i < all.length; i++){
        if (all[i].indexOf('m_') === 0) metas.push(all[i]);
      }
      var keys = [];
      if (metas.length){
        var vals = await cs('getItems', metas);
        for (var k in vals){
          var v = vals[k] || '';
          var p = v.indexOf('|');
          var orig = p >= 0 ? v.slice(p + 1) : k.slice(2);
          if (!prefix || orig.indexOf(prefix) === 0) keys.push(orig);
        }
      }
      return { keys: keys, shared: false };
    }
  };

  if (!window.storage){
    window.storage = useCloud ? cloudApi : localApi;
  }

  function storageDiagText(){
    if (!tg) return 'Открыто вне Telegram \u2014 тест в браузере (данные временные).';
    if (!hasCS) return 'Облако Telegram недоступно в этой версии приложения \u2014 обновите Telegram до последней версии. Сейчас данные хранятся временно.';
    if (!hasInit) return 'Telegram не передал данные запуска \u2014 попробуйте закрыть и открыть приложение заново через кнопку у бота.';
    return 'Хранилище: облако Telegram (данные сохраняются на вашем аккаунте).';
  }

  /* ===== Панель: перенос данных + диагностика ===== */
  function buildPanel(){
    var css = document.createElement('style');
    css.textContent =
      '#syncBtn{position:fixed;left:12px;bottom:12px;z-index:9998;width:40px;height:40px;border-radius:50%;' +
      'border:1px solid #E2E6EC;background:#fff;color:#1C4E80;font-size:17px;cursor:pointer;' +
      'box-shadow:0 2px 8px rgba(22,35,58,.12);display:flex;align-items:center;justify-content:center;}' +
      '#syncOverlay{position:fixed;inset:0;background:rgba(22,35,58,.45);z-index:9999;display:none;' +
      'align-items:flex-end;justify-content:center;}' +
      '#syncOverlay.open{display:flex;}' +
      '#syncPanel{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:520px;padding:16px;' +
      'font-family:"IBM Plex Sans",-apple-system,sans-serif;color:#16233A;max-height:88vh;overflow-y:auto;}' +
      '#syncPanel h3{margin:0 0 10px;font-size:15px;}' +
      '#syncPanel textarea{width:100%;height:130px;border:1px solid #E2E6EC;border-radius:10px;padding:9px;' +
      'font-family:"IBM Plex Mono",monospace;font-size:11px;box-sizing:border-box;resize:vertical;}' +
      '#syncPanel .row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}' +
      '#syncPanel button{flex:1;min-width:120px;padding:10px;border-radius:10px;border:1px solid #E2E6EC;' +
      'background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#16233A;}' +
      '#syncPanel button.primary{background:#1C4E80;color:#fff;border-color:#1C4E80;}' +
      '#syncPanel .home{display:block;text-align:center;margin-top:12px;font-size:13px;color:#1C4E80;' +
      'text-decoration:none;font-weight:600;}' +
      '#syncPanel .hint{font-size:11.5px;color:#647089;margin:6px 0 0;line-height:1.5;}' +
      '#syncPanel .diag{font-size:11.5px;background:#F2F4F6;border-radius:10px;padding:8px 10px;margin-top:4px;' +
      'line-height:1.5;}' +
      '#syncPanel .diag.bad{background:#FBEAE8;color:#8A2A20;}' +
      '#syncPanel .diag.ok{background:#E7F3EC;color:#1E6B44;}';
    document.head.appendChild(css);

    var btn = document.createElement('button');
    btn.id = 'syncBtn';
    btn.type = 'button';
    btn.title = 'Данные';
    btn.textContent = '\u21C5';
    document.body.appendChild(btn);

    var diagClass = (!tg || !hasCS || !hasInit) ? 'bad' : 'ok';

    var overlay = document.createElement('div');
    overlay.id = 'syncOverlay';
    overlay.innerHTML =
      '<div id="syncPanel">' +
        '<h3>Перенос данных</h3>' +
        '<div class="diag ' + diagClass + '" id="syncDiag">' + storageDiagText() + '</div>' +
        '<div class="row"><button type="button" id="syncTest">Проверить сохранение</button></div>' +
        '<textarea id="syncArea" placeholder="Здесь появятся данные при выгрузке. Для загрузки — вставьте сюда данные и нажмите \u00ABЗагрузить\u00BB."></textarea>' +
        '<div class="row">' +
          '<button type="button" id="syncExport">Выгрузить данные</button>' +
          '<button type="button" id="syncImport" class="primary">Загрузить данные</button>' +
        '</div>' +
        '<div class="row"><button type="button" id="syncClose">Закрыть</button></div>' +
        '<a class="home" href="index.html">\u2190 К выбору списка</a>' +
      '</div>';
    document.body.appendChild(overlay);

    var area = overlay.querySelector('#syncArea');
    var hint = overlay.querySelector('#syncDiag');

    btn.addEventListener('click', function(){ overlay.classList.add('open'); });
    overlay.querySelector('#syncClose').addEventListener('click', function(){ overlay.classList.remove('open'); });
    overlay.addEventListener('click', function(e){ if (e.target === overlay) overlay.classList.remove('open'); });

    overlay.querySelector('#syncTest').addEventListener('click', async function(){
      hint.className = 'diag';
      hint.textContent = 'Проверяю\u2026';
      var testKey = '__diag_test__';
      var testVal = 'ok-' + Date.now();
      try {
        await window.storage.set(testKey, testVal);
        var res = await window.storage.get(testKey);
        if (res && res.value === testVal){
          hint.className = 'diag ok';
          hint.textContent = useCloud
            ? 'Сохранение работает: данные пишутся в облако Telegram. Проверено ' + new Date().toLocaleTimeString('ru-RU') + '.'
            : 'Тест прошёл, но пишется во временную память браузера (без облака Telegram) — при переоткрытии приложения данные могут потеряться. ' + storageDiagText();
        } else {
          hint.className = 'diag bad';
          hint.textContent = 'Тест не прошёл: записанное значение не совпало с прочитанным.';
        }
      } catch(err){
        hint.className = 'diag bad';
        hint.textContent = 'Ошибка сохранения: ' + (err && (err.message || err)) + '. ' + storageDiagText();
      }
    });

    overlay.querySelector('#syncExport').addEventListener('click', function(){
      window.storage.list('').then(function(res){
        var keys = ((res && res.keys) || []).filter(function(k){ return k.indexOf('__diag_test__') !== 0; });
        if (!keys.length){ area.value = '{}'; return; }
        var dump = {};
        var chain = Promise.resolve();
        keys.forEach(function(k){
          chain = chain.then(function(){
            return window.storage.get(k).then(function(r){ if (r) dump[k] = r.value; });
          });
        });
        chain.then(function(){
          area.value = JSON.stringify(dump);
          area.select();
          try { document.execCommand('copy'); toast('Данные выгружены и скопированы в буфер.'); }
          catch(e){ toast('Данные выгружены — скопируйте текст вручную.'); }
        });
      });
    });

    overlay.querySelector('#syncImport').addEventListener('click', function(){
      var txt = area.value.trim();
      if (!txt){ toast('Поле пустое — вставьте данные для загрузки.', true); return; }
      var data;
      try { data = JSON.parse(txt); }
      catch(e){ toast('Не удалось прочитать данные: проверьте, что вставлен весь текст целиком.', true); return; }
      var keys = Object.keys(data);
      if (!keys.length){ toast('В данных нет записей.', true); return; }
      toast('Загружаю\u2026');
      var chain = Promise.resolve();
      keys.forEach(function(k){
        chain = chain.then(function(){ return window.storage.set(k, data[k]); });
      });
      chain.then(function(){
        toast('Готово. Обновляю страницу\u2026');
        setTimeout(function(){ location.reload(); }, 600);
      }).catch(function(){
        toast('Часть данных не загрузилась — попробуйте ещё раз.', true);
      });
    });
  }

  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', buildPanel);
  } else {
    buildPanel();
  }
})();

</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #ECEEE6;
    --card: #FBFBF6;
    --ink: #17241E;
    --ink-soft: #56695F;
    --border: #D9DBC9;
    --accent: #6B3446;
    --accent-soft: #F1E1E6;
    --good: #1F7A55;
    --good-soft: #E1F1E8;
    --amber: #B8823A;
    --amber-soft: #F7EDDC;
    --stamp: #A33B2E;
    --chan: #2C3E63;
    --chan-soft: #E2E6F0;
    --chat: #3F5D3A;
    --chat-soft: #E3EAE0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'IBM Plex Sans', -apple-system, sans-serif;
    min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'IBM Plex Mono', monospace;}
  #app{max-width:520px;margin:0 auto;padding:16px 14px 90px;}

  header.top{ margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid var(--border); }
  header.top h1{ font-family:'Fraunces', serif; font-size:20px; margin:0; font-weight:600; letter-spacing:-0.01em; }
  header.top .sub{ font-size:11.5px; color:var(--ink-soft); margin-top:3px; font-family:'IBM Plex Mono',monospace; }

  .stats-row{ display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:12px; }
  .stat-cell{ background:var(--card); border:1px solid var(--border); border-radius:4px; padding:10px 12px; }
  .stat-num{ font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:700; }
  .stat-label{ font-size:10px; text-transform:uppercase; letter-spacing:0.5px; color:var(--ink-soft); margin-top:2px; }

  /* group tabs: Каналы / Чаты */
  .group-tabs{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:16px; }
  .group-tab{ border:2px solid var(--ink); border-radius:4px; padding:10px 12px; background:var(--card); cursor:pointer; }
  .group-tab.active{ background:var(--accent-soft); border-color:var(--accent); }
  .group-tab-label{ font-family:'Fraunces',serif; font-weight:600; font-size:15px; }
  .group-tab-sub{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--ink-soft); margin-top:2px; }

  .tabs{ display:flex; gap:6px; margin-top:12px; flex-wrap:wrap; }
  .tab-btn{
    font-family:'IBM Plex Mono', monospace; font-size:11.5px; padding:8px 10px;
    background:var(--card); border:1px solid var(--border); cursor:pointer; border-radius:4px;
    color:var(--ink-soft); flex:1; text-align:center;
  }
  .tab-btn.active{ background:var(--ink); color:#fff; border-color:var(--ink); font-weight:600; }
  .tab-count{ display:block; font-size:9.5px; opacity:.8; margin-top:1px; }

  .panel-body{ margin-top:14px; }

  .seg-brief{ display:flex; gap:12px; border:1px solid var(--ink); border-radius:4px; padding:13px 14px; margin-bottom:14px; background:var(--card); }
  .seg-brief-num{ font-family:'Fraunces',serif; font-weight:700; font-size:30px; color:var(--border); line-height:1; flex-shrink:0; }
  .seg-brief-title{ font-family:'Fraunces',serif; font-weight:600; font-size:15px; margin-bottom:6px; }
  .seg-brief-what,.seg-brief-how{ font-size:12px; color:var(--ink-soft); margin-bottom:4px; line-height:1.5; }
  .seg-brief-what b,.seg-brief-how b{ color:var(--ink); }

  .controls{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
  .controls input[type=text], .controls select{
    font-family:'IBM Plex Sans',sans-serif; font-size:12.5px; padding:8px 10px;
    border:1px solid var(--border); border-radius:4px; background:var(--card); color:var(--ink);
  }
  .controls .grow{ flex:1 1 100%; }
  .controls select{ flex:1; }
  .note{ font-size:11px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace; flex-basis:100%; }

  .list{ display:flex; flex-direction:column; gap:8px; }
  .item-card{ background:var(--card); border:1px solid var(--border); border-radius:4px; padding:12px 13px; border-left:3px solid var(--accent); }
  .item-card.type-channel{ border-left-color:var(--chan); }
  .item-card.type-chat{ border-left-color:var(--chat); }
  .item-top{ display:flex; justify-content:space-between; gap:8px; align-items:flex-start; }
  .item-name{ font-family:'Fraunces',serif; font-weight:600; font-size:14px; line-height:1.3; }
  .item-name a{ color:var(--ink); text-decoration:none; }
  .item-name a:active{ opacity:.7; }
  .item-subs{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--ink-soft); background:var(--bg); border:1px solid var(--border); border-radius:3px; padding:2px 6px; white-space:nowrap; flex-shrink:0; }
  .item-meta{ font-size:11px; color:var(--ink-soft); margin-top:3px; }
  .type-badge{ display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:9px; text-transform:uppercase; padding:1px 5px; border-radius:2px; margin-right:5px; }
  .type-badge.channel{ background:var(--chan-soft); color:var(--chan); }
  .type-badge.chat{ background:var(--chat-soft); color:var(--chat); }
  .tag{ display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:9.5px; background:var(--bg); border:1px solid var(--border); padding:1px 5px; border-radius:2px; margin:2px 3px 0 0; color:var(--ink-soft); }

  .item-row2{ display:flex; gap:8px; margin-top:8px; }
  select.status-select{
    flex:1; appearance:none; -webkit-appearance:none; border-radius:4px; border:1.5px solid var(--border);
    padding:8px 26px 8px 9px; font-size:12.5px; font-weight:600; font-family:'IBM Plex Sans',sans-serif;
    background:#fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path d="M0 0l5 6 5-6z" fill="%2356695F"/></svg>') no-repeat right 9px center;
    color:var(--ink);
  }
  .status-new{ color:var(--ink-soft); }
  .status-wrote{ color:var(--amber); }
  .status-replied{ color:#2E6FA7; }
  .status-deal{ color:var(--good); }
  .status-declined{ color:var(--stamp); }

  input.note-input{
    width:100%; margin-top:7px; border:1px solid var(--border); border-radius:4px; padding:8px 9px;
    font-size:12px; font-family:'IBM Plex Sans',sans-serif; color:var(--ink); background:#fff;
  }

  .load-more{ display:block; width:100%; margin-top:10px; background:transparent; border:1px solid var(--border); border-radius:4px; padding:10px; font-size:12.5px; font-weight:600; color:var(--ink); cursor:pointer; font-family:'IBM Plex Sans',sans-serif; }
  .empty{ text-align:center; padding:36px 16px; color:var(--ink-soft); background:var(--card); border:1px solid var(--border); border-radius:4px; font-size:13px; }

  .toast{ position:fixed; left:50%; bottom:70px; transform:translate(-50%, 12px); background:var(--ink); color:#fff; padding:9px 16px; border-radius:20px; font-size:12.5px; opacity:0; transition:all .25s ease; pointer-events:none; z-index:9500; font-weight:500; }
  .toast.show{ opacity:1; transform:translate(-50%,0); }
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <h1>Трекер: Telegram</h1>
    <div class="sub">Каналы и чаты · 1160 контактов</div>
    <div class="stats-row" id="statsRow"></div>
  </header>

  <div class="group-tabs" id="groupTabs"></div>
  <div class="tabs" id="segTabs"></div>
  <div class="panel-body" id="panelBody"></div>
</div>

const SEG = {
  1:{ num:'01', label:'Купить рекламу', unit:'канал',
      what:'В описании канала уже указан отдельный рекламный контакт (менеджер).',
      how:'Пишите этому контакту напрямую, спросите прайс на пост/интеграцию. Не пишите в сам канал — это односторонняя рассылка, там никто не читает сообщения от подписчиков.' },
  2:{ num:'02', label:'Партнёрка с брокерами', unit:'канал',
      what:'Канал ведёт компания, которая сама возит машины — реклама у них не нужна, у них уже есть эта аудитория.',
      how:'Пишите владельцу канала: предложите брать на себя растаможку/оформление его клиентов за агентский % — не разовую услугу, а постоянную схему.' },
  3:{ num:'03', label:'Точечный контакт', unit:'чат',
      what:'Групповой чат, но реклама в общий чат либо запрещена правилами, либо есть выделенный контакт (админ/менеджер).',
      how:'Не постите в общий чат — забанят или проигнорируют. Пишите указанному контакту в личку.' },
  4:{ num:'04', label:'Органика в чатах', unit:'чат',
      what:'Открытый чат без выделенного контакта — там сидят и брокеры, и обычные покупатели авто.',
      how:'Отвечайте по делу на вопросы про растаможку/утильсбор/СБКТС — без прямой рекламы. Реклама в лоб здесь обычно быстро банится.' }
};
const GROUPS = {
  channels:{ label:'Каналы', segs:[1,2], type:'channel' },
  chats:{ label:'Чаты', segs:[3,4], type:'chat' }
};
const COUNTRY_NAMES = {KR:'Корея',CN:'Китай',US:'США',GE:'Грузия',KZ:'Казахстан',AE:'ОАЭ',EU:'Европа',JP:'Япония',BY:'Беларусь'};
const STATUS = {
  new:{label:'Не начато', cls:'status-new'},
  wrote:{label:'Написали', cls:'status-wrote'},
  replied:{label:'Ответили', cls:'status-replied'},
  deal:{label:'Договорились', cls:'status-deal'},
  declined:{label:'Отказ', cls:'status-declined'}
};

const STORAGE_KEY = 'tg-status';
let state = { contacts: {} };
let saveTimer = null;

function getStatus(link){ const c = state.contacts[link]; return c && c.status ? c.status : 'new'; }
function getNote(link){ const c = state.contacts[link]; return c && c.note ? c.note : ''; }
function setContact(link, patch){
  const c = state.contacts[link] || {};
  Object.assign(c, patch, { updatedAt: Date.now() });
  state.contacts[link] = c;
  scheduleSave();
}
function scheduleSave(){ clearTimeout(saveTimer); saveTimer = setTimeout(persist, 500); }
async function persist(){
  try{ await window.storage.set(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ showToast('Ошибка сохранения'); console.error(e); }
}
async function load(){
  try{
    const res = await window.storage.get(STORAGE_KEY);
    if(res && res.value){ const p = JSON.parse(res.value); state.contacts = p.contacts || {}; }
  }catch(e){ /* нет сохранённых данных пока */ }
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=> t.classList.remove('show'), 1600);
}
function fmtSubs(n){ if(n>=1000) return (n/1000).toFixed(n>=10000?0:1).replace('.0','')+'k'; return String(n); }
function countryTags(c){
  if(!c) return '';
  return c.split(',').filter(Boolean).map(code => `<span class="tag">${COUNTRY_NAMES[code]||code}</span>`).join('');
}
function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let activeGroup = 'channels';
let activeSeg = 1;
const PAGE_SIZE = 25;
let listPage = {1:1,2:1,3:1,4:1};
let listFilter = { 1:{q:'',country:'',status:''}, 2:{q:'',country:'',status:''}, 3:{q:'',country:'',status:''}, 4:{q:'',country:'',status:''} };

function segStats(seg){
  const items = DATA.filter(d => d.seg===seg);
  const done = items.filter(d => getStatus(d.l)!=='new').length;
  return { total: items.length, done };
}
function groupStats(key){
  const g = GROUPS[key];
  const items = DATA.filter(d => d.t===g.type);
  const done = items.filter(d => getStatus(d.l)!=='new').length;
  return { total: items.length, done };
}

function render(){
  renderStats();
  renderGroupTabs();
  renderSegTabs();
  renderPanel();
}

function renderStats(){
  const dealCount = Object.values(state.contacts).filter(c => c.status==='deal').length;
  const repliedCount = Object.values(state.contacts).filter(c => c.status==='replied').length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-cell"><div class="stat-num">${repliedCount}</div><div class="stat-label">Ответили</div></div>
    <div class="stat-cell"><div class="stat-num">${dealCount}</div><div class="stat-label">Договорились</div></div>
  `;
}

function renderGroupTabs(){
  let html = '';
  ['channels','chats'].forEach(key => {
    const g = GROUPS[key]; const st = groupStats(key);
    html += `<div class="group-tab ${key===activeGroup?'active':''}" data-group="${key}">
      <div class="group-tab-label">${g.label}</div>
      <div class="group-tab-sub">${st.total} · ${st.done} в работе</div>
    </div>`;
  });
  const el = document.getElementById('groupTabs');
  el.innerHTML = html;
  el.querySelectorAll('.group-tab').forEach(t => {
    t.addEventListener('click', () => {
      activeGroup = t.getAttribute('data-group');
      activeSeg = GROUPS[activeGroup].segs[0];
      render();
    });
  });
}

function renderSegTabs(){
  let html = '';
  GROUPS[activeGroup].segs.forEach(seg => {
    const st = segStats(seg);
    html += `<div class="tab-btn ${seg===activeSeg?'active':''}" data-seg="${seg}">${SEG[seg].num} ${SEG[seg].label}<span class="tab-count">${st.done}/${st.total}</span></div>`;
  });
  const el = document.getElementById('segTabs');
  el.innerHTML = html;
  el.querySelectorAll('.tab-btn').forEach(t => {
    t.addEventListener('click', () => { activeSeg = parseInt(t.getAttribute('data-seg')); render(); });
  });
}

function renderPanel(){
  const seg = activeSeg;
  const info = SEG[seg];
  let html = `<div class="seg-brief">
    <div class="seg-brief-num">${info.num}</div>
    <div>
      <div class="seg-brief-title">${info.label}</div>
      <div class="seg-brief-what"><b>Что это:</b> ${info.what}</div>
      <div class="seg-brief-how"><b>Что делать:</b> ${info.how}</div>
    </div>
  </div>`;

  listPage[seg] = listPage[seg] || 1;
  const f = listFilter[seg];
  let items = DATA.filter(d => d.seg===seg);
  if(f.q){ const q = f.q.toLowerCase(); items = items.filter(d => d.n.toLowerCase().includes(q) || d.l.toLowerCase().includes(q)); }
  if(f.country){ items = items.filter(d => (d.c||'').includes(f.country)); }
  if(f.status){ items = items.filter(d => getStatus(d.l)===f.status); }
  const total = items.length;
  const shown = items.slice(0, listPage[seg]*PAGE_SIZE);
  const allInSeg = DATA.filter(d => d.seg===seg).length;

  const countryOptions = Object.keys(COUNTRY_NAMES).map(code => `<option value="${code}" ${f.country===code?'selected':''}>${COUNTRY_NAMES[code]}</option>`).join('');
  const statusOptionsFilter = Object.keys(STATUS).map(k => `<option value="${k}" ${f.status===k?'selected':''}>${STATUS[k].label}</option>`).join('');

  html += `<div class="controls">
    <input type="text" class="grow" id="segSearch" placeholder="Поиск по названию или ссылке..." value="${esc(f.q)}">
    <select id="segCountry"><option value="">Все страны</option>${countryOptions}</select>
    <select id="segStatusFilter"><option value="">Любой статус</option>${statusOptionsFilter}</select>
    <span class="note">${total} из ${allInSeg} ${info.unit==='канал'?'каналов':'чатов'}</span>
  </div>`;

  if(total===0){
    html += `<div class="empty">Ничего не найдено по этому фильтру.</div>`;
  } else {
    html += `<div class="list">${shown.map(rowHtml).join('')}</div>`;
    if(shown.length < total){
      html += `<button class="load-more" id="loadMore">Показать ещё (${total-shown.length})</button>`;
    }
  }
  document.getElementById('panelBody').innerHTML = html;
  wirePanelEvents();
}

function rowHtml(item){
  const st = getStatus(item.l);
  const statusOptions = Object.keys(STATUS).map(k => `<option value="${k}" ${k===st?'selected':''}>${STATUS[k].label}</option>`).join('');
  const typeBadge = item.t==='channel' ? '<span class="type-badge channel">канал</span>' : '<span class="type-badge chat">чат</span>';
  return `<div class="item-card type-${item.t}" data-link="${esc(item.l)}">
    <div class="item-top">
      <div class="item-name">${typeBadge}<a href="${esc(item.l)}" target="_blank" rel="noopener">${esc(item.n)}</a></div>
      <div class="item-subs">👁 ${fmtSubs(item.s)}</div>
    </div>
    <div class="item-meta">${countryTags(item.c)}${item.k ? ' · '+esc(item.k) : ''}${item.p ? ' · '+esc(item.p) : ''}</div>
    <div class="item-row2">
      <select class="status-select ${STATUS[st].cls}" data-status-link="${esc(item.l)}">${statusOptions}</select>
    </div>
    <input type="text" class="note-input" data-link="${esc(item.l)}" placeholder="Заметка..." value="${esc(getNote(item.l)).replace(/"/g,'&quot;')}">
  </div>`;
}

function wirePanelEvents(){
  document.querySelectorAll('[data-status-link]').forEach(sel => {
    sel.addEventListener('change', () => {
      setContact(sel.getAttribute('data-status-link'), { status: sel.value });
      sel.className = 'status-select ' + STATUS[sel.value].cls;
      renderStats(); renderGroupTabs(); renderSegTabs();
      showToast('Статус: ' + STATUS[sel.value].label);
    });
  });
  document.querySelectorAll('.note-input').forEach(inp => {
    inp.addEventListener('change', () => setContact(inp.getAttribute('data-link'), { note: inp.value }));
  });
  const searchEl = document.getElementById('segSearch');
  if(searchEl){
    let t;
    searchEl.addEventListener('input', () => {
      clearTimeout(t);
      t = setTimeout(() => { listFilter[activeSeg].q = searchEl.value; listPage[activeSeg]=1; renderPanel(); }, 250);
    });
  }
  const countryEl = document.getElementById('segCountry');
  if(countryEl) countryEl.addEventListener('change', () => { listFilter[activeSeg].country = countryEl.value; listPage[activeSeg]=1; renderPanel(); });
  const statusFilterEl = document.getElementById('segStatusFilter');
  if(statusFilterEl) statusFilterEl.addEventListener('change', () => { listFilter[activeSeg].status = statusFilterEl.value; listPage[activeSeg]=1; renderPanel(); });
  const loadMoreEl = document.getElementById('loadMore');
  if(loadMoreEl) loadMoreEl.addEventListener('click', () => { listPage[activeSeg] = (listPage[activeSeg]||1)+1; renderPanel(); });
}

(async function init(){
  document.getElementById('panelBody').innerHTML = '<div class="empty">Загружаем ваши данные...</div>';
  await load();
  render();
})();
</script>
