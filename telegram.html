<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Трекер: TG рассылка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
/* ===== Адаптер хранилища: Telegram CloudStorage / localStorage ===== */
(function(){
  var tg = window.Telegram && window.Telegram.WebApp;
  var hasCS = !!(tg && tg.CloudStorage);
  var hasInit = !!(tg && tg.initData && tg.initData.length > 0);
  var useCloud = hasCS && hasInit;

  if (tg) {
    try { tg.ready(); tg.expand(); } catch(e){}
    try {
      tg.BackButton.show();
      tg.BackButton.onClick(function(){ location.href = 'index.html'; });
    } catch(e){}
  }

  var CHUNK = 1500; /* запас под лимит 4096 символов на ключ */

  function san(k){ return String(k).replace(/[^A-Za-z0-9_-]/g, '_'); }

  function toast(msg, isError){
    try {
      if (typeof window.showToast === 'function'){ window.showToast(msg); return; }
    } catch(e){}
    var t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'position:fixed;left:50%;bottom:78px;transform:translateX(-50%);' +
      'background:' + (isError ? '#B23A2E' : '#16233A') + ';color:#fff;padding:9px 15px;border-radius:20px;' +
      'font-size:12.5px;z-index:10000;max-width:88%;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.25);' +
      'font-family:-apple-system,sans-serif;';
    document.body.appendChild(t);
    setTimeout(function(){ t.remove(); }, isError ? 4200 : 2400);
  }

  function cs(method){
    var args = Array.prototype.slice.call(arguments, 1);
    return new Promise(function(resolve, reject){
      args.push(function(err, val){ if (err) reject(err); else resolve(val); });
      tg.CloudStorage[method].apply(tg.CloudStorage, args);
    });
  }

  /* --- локальное хранилище (резерв и работа вне Телеграма) --- */
  var localApi = {
    get: function(key){
      var v = localStorage.getItem('st_' + key);
      return Promise.resolve(v === null ? null : { key: key, value: v, shared: false });
    },
    set: function(key, value){
      localStorage.setItem('st_' + key, String(value));
      return Promise.resolve({ key: key, value: String(value), shared: false });
    },
    "delete": function(key){
      localStorage.removeItem('st_' + key);
      return Promise.resolve({ key: key, deleted: true, shared: false });
    },
    list: function(prefix){
      var keys = [];
      for (var i = 0; i < localStorage.length; i++){
        var k = localStorage.key(i);
        if (k && k.indexOf('st_') === 0){
          var ok = k.slice(3);
          if (!prefix || ok.indexOf(prefix) === 0) keys.push(ok);
        }
      }
      return Promise.resolve({ keys: keys, shared: false });
    }
  };

  /* --- облако Телеграма с разбиением на части --- */
  var cloudApi = {
    get: async function(key){
      var s = san(key);
      var metaObj = await cs('getItems', ['m_' + s]);
      var meta = metaObj['m_' + s];
      if (!meta){
        return localApi.get(key);
      }
      var n = parseInt(meta, 10) || 1;
      var keys = [];
      for (var i = 0; i < n; i++) keys.push('c_' + s + '_' + i);
      var parts = await cs('getItems', keys);
      var out = '';
      for (var j = 0; j < n; j++) out += (parts['c_' + s + '_' + j] || '');
      return { key: key, value: out, shared: false };
    },
    set: async function(key, value){
      try {
        var s = san(key);
        value = String(value);
        var n = Math.max(1, Math.ceil(value.length / CHUNK));
        var old = 0;
        try {
          var mo = await cs('getItems', ['m_' + s]);
          old = parseInt(mo['m_' + s], 10) || 0;
        } catch(e){}
        for (var i = 0; i < n; i++){
          await cs('setItem', 'c_' + s + '_' + i, value.substr(i * CHUNK, CHUNK));
        }
        await cs('setItem', 'm_' + s, n + '|' + key);
        if (old > n){
          var rm = [];
          for (var j = n; j < old; j++) rm.push('c_' + s + '_' + j);
          try { await cs('removeItems', rm); } catch(e){}
        }
        try { localStorage.setItem('st_' + key, value); } catch(e){}
        return { key: key, value: value, shared: false };
      } catch(err){
        try { localStorage.setItem('st_' + key, String(value)); } catch(e){}
        toast('Не сохранилось в облако Телеграма (' + (err && (err.message || err)) + '). Сохранено временно в память браузера.', true);
        throw err;
      }
    },
    "delete": async function(key){
      var s = san(key);
      var mo = await cs('getItems', ['m_' + s]);
      var n = parseInt(mo['m_' + s], 10) || 0;
      var rm = ['m_' + s];
      for (var i = 0; i < n; i++) rm.push('c_' + s + '_' + i);
      await cs('removeItems', rm);
      try { localStorage.removeItem('st_' + key); } catch(e){}
      return { key: key, deleted: true, shared: false };
    },
    list: async function(prefix){
      var all = await cs('getKeys');
      var metas = [];
      for (var i = 0; i < all.length; i++){
        if (all[i].indexOf('m_') === 0) metas.push(all[i]);
      }
      var keys = [];
      if (metas.length){
        var vals = await cs('getItems', metas);
        for (var k in vals){
          var v = vals[k] || '';
          var p = v.indexOf('|');
          var orig = p >= 0 ? v.slice(p + 1) : k.slice(2);
          if (!prefix || orig.indexOf(prefix) === 0) keys.push(orig);
        }
      }
      return { keys: keys, shared: false };
    }
  };

  if (!window.storage){
    window.storage = useCloud ? cloudApi : localApi;
  }

  function storageDiagText(){
    if (!tg) return 'Открыто вне Telegram \u2014 тест в браузере (данные временные).';
    if (!hasCS) return 'Облако Telegram недоступно в этой версии приложения \u2014 обновите Telegram до последней версии. Сейчас данные хранятся временно.';
    if (!hasInit) return 'Telegram не передал данные запуска \u2014 попробуйте закрыть и открыть приложение заново через кнопку у бота.';
    return 'Хранилище: облако Telegram (данные сохраняются на вашем аккаунте).';
  }

  /* ===== Панель: перенос данных + диагностика ===== */
  function buildPanel(){
    var css = document.createElement('style');
    css.textContent =
      '#syncBtn{position:fixed;left:12px;bottom:12px;z-index:9998;width:40px;height:40px;border-radius:50%;' +
      'border:1px solid #E2E6EC;background:#fff;color:#1C4E80;font-size:17px;cursor:pointer;' +
      'box-shadow:0 2px 8px rgba(22,35,58,.12);display:flex;align-items:center;justify-content:center;}' +
      '#syncOverlay{position:fixed;inset:0;background:rgba(22,35,58,.45);z-index:9999;display:none;' +
      'align-items:flex-end;justify-content:center;}' +
      '#syncOverlay.open{display:flex;}' +
      '#syncPanel{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:520px;padding:16px;' +
      'font-family:"IBM Plex Sans",-apple-system,sans-serif;color:#16233A;max-height:88vh;overflow-y:auto;}' +
      '#syncPanel h3{margin:0 0 10px;font-size:15px;}' +
      '#syncPanel textarea{width:100%;height:130px;border:1px solid #E2E6EC;border-radius:10px;padding:9px;' +
      'font-family:"IBM Plex Mono",monospace;font-size:11px;box-sizing:border-box;resize:vertical;}' +
      '#syncPanel .row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}' +
      '#syncPanel button{flex:1;min-width:120px;padding:10px;border-radius:10px;border:1px solid #E2E6EC;' +
      'background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#16233A;}' +
      '#syncPanel button.primary{background:#1C4E80;color:#fff;border-color:#1C4E80;}' +
      '#syncPanel .home{display:block;text-align:center;margin-top:12px;font-size:13px;color:#1C4E80;' +
      'text-decoration:none;font-weight:600;}' +
      '#syncPanel .hint{font-size:11.5px;color:#647089;margin:6px 0 0;line-height:1.5;}' +
      '#syncPanel .diag{font-size:11.5px;background:#F2F4F6;border-radius:10px;padding:8px 10px;margin-top:4px;' +
      'line-height:1.5;}' +
      '#syncPanel .diag.bad{background:#FBEAE8;color:#8A2A20;}' +
      '#syncPanel .diag.ok{background:#E7F3EC;color:#1E6B44;}';
    document.head.appendChild(css);

    var btn = document.createElement('button');
    btn.id = 'syncBtn';
    btn.type = 'button';
    btn.title = 'Данные';
    btn.textContent = '\u21C5';
    document.body.appendChild(btn);

    var diagClass = (!tg || !hasCS || !hasInit) ? 'bad' : 'ok';

    var overlay = document.createElement('div');
    overlay.id = 'syncOverlay';
    overlay.innerHTML =
      '<div id="syncPanel">' +
        '<h3>Перенос данных</h3>' +
        '<div class="diag ' + diagClass + '" id="syncDiag">' + storageDiagText() + '</div>' +
        '<div class="row"><button type="button" id="syncTest">Проверить сохранение</button></div>' +
        '<textarea id="syncArea" placeholder="Здесь появятся данные при выгрузке. Для загрузки — вставьте сюда данные и нажмите \u00ABЗагрузить\u00BB."></textarea>' +
        '<div class="row">' +
          '<button type="button" id="syncExport">Выгрузить данные</button>' +
          '<button type="button" id="syncImport" class="primary">Загрузить данные</button>' +
        '</div>' +
        '<div class="row"><button type="button" id="syncClose">Закрыть</button></div>' +
        '<a class="home" href="index.html">\u2190 К выбору списка</a>' +
      '</div>';
    document.body.appendChild(overlay);

    var area = overlay.querySelector('#syncArea');
    var hint = overlay.querySelector('#syncDiag');

    btn.addEventListener('click', function(){ overlay.classList.add('open'); });
    overlay.querySelector('#syncClose').addEventListener('click', function(){ overlay.classList.remove('open'); });
    overlay.addEventListener('click', function(e){ if (e.target === overlay) overlay.classList.remove('open'); });

    overlay.querySelector('#syncTest').addEventListener('click', async function(){
      hint.className = 'diag';
      hint.textContent = 'Проверяю\u2026';
      var testKey = '__diag_test__';
      var testVal = 'ok-' + Date.now();
      try {
        await window.storage.set(testKey, testVal);
        var res = await window.storage.get(testKey);
        if (res && res.value === testVal){
          hint.className = 'diag ok';
          hint.textContent = useCloud
            ? 'Сохранение работает: данные пишутся в облако Telegram. Проверено ' + new Date().toLocaleTimeString('ru-RU') + '.'
            : 'Тест прошёл, но пишется во временную память браузера (без облака Telegram) — при переоткрытии приложения данные могут потеряться. ' + storageDiagText();
        } else {
          hint.className = 'diag bad';
          hint.textContent = 'Тест не прошёл: записанное значение не совпало с прочитанным.';
        }
      } catch(err){
        hint.className = 'diag bad';
        hint.textContent = 'Ошибка сохранения: ' + (err && (err.message || err)) + '. ' + storageDiagText();
      }
    });

    overlay.querySelector('#syncExport').addEventListener('click', function(){
      window.storage.list('').then(function(res){
        var keys = ((res && res.keys) || []).filter(function(k){ return k.indexOf('__diag_test__') !== 0; });
        if (!keys.length){ area.value = '{}'; return; }
        var dump = {};
        var chain = Promise.resolve();
        keys.forEach(function(k){
          chain = chain.then(function(){
            return window.storage.get(k).then(function(r){ if (r) dump[k] = r.value; });
          });
        });
        chain.then(function(){
          area.value = JSON.stringify(dump);
          area.select();
          try { document.execCommand('copy'); toast('Данные выгружены и скопированы в буфер.'); }
          catch(e){ toast('Данные выгружены — скопируйте текст вручную.'); }
        });
      });
    });

    overlay.querySelector('#syncImport').addEventListener('click', function(){
      var txt = area.value.trim();
      if (!txt){ toast('Поле пустое — вставьте данные для загрузки.', true); return; }
      var data;
      try { data = JSON.parse(txt); }
      catch(e){ toast('Не удалось прочитать данные: проверьте, что вставлен весь текст целиком.', true); return; }
      var keys = Object.keys(data);
      if (!keys.length){ toast('В данных нет записей.', true); return; }
      toast('Загружаю\u2026');
      var chain = Promise.resolve();
      keys.forEach(function(k){
        chain = chain.then(function(){ return window.storage.set(k, data[k]); });
      });
      chain.then(function(){
        toast('Готово. Обновляю страницу\u2026');
        setTimeout(function(){ location.reload(); }, 600);
      }).catch(function(){
        toast('Часть данных не загрузилась — попробуйте ещё раз.', true);
      });
    });
  }

  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', buildPanel);
  } else {
    buildPanel();
  }
})();

</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #17241E;
    --ink-soft: #56695F;
    --bg: #ECEEE6;
    --card: #FBFBF6;
    --border: #D9DBC9;
    --accent: #6B3A45;
    --accent-soft: #F1E3E6;
    --stamp: #A33B2E;
    --good: #1F7A55;
    --good-soft: #E1F1E8;
    --amber: #B8823A;
    --amber-soft: #F7EDDC;
    --purple: #8B4A2B;
    --purple-soft: #F1E4DB;
    --gray: #8B9184;
    --gray-soft: #E9EAE1;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'IBM Plex Sans', -apple-system, sans-serif;
    min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'IBM Plex Mono', monospace;}
  #app{max-width:520px;margin:0 auto;padding:16px 14px 90px;}

  header.top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid var(--border); }
  header.top h1{ font-family:'Fraunces', serif; font-size:20px; margin:0; font-weight:600; letter-spacing:-0.01em; }
  header.top .sub{ font-size:11.5px; color:var(--ink-soft); margin-top:3px; font-family:'IBM Plex Mono',monospace; }
  .badge-total{
    font-family:'IBM Plex Mono', monospace; font-size:11px; background:var(--accent-soft); color:var(--accent);
    padding:4px 9px; border-radius:3px; font-weight:600; white-space:nowrap; border:1px solid var(--accent);
  }

  .tabbar{ display:flex; background:var(--card); border:1px solid var(--border); border-radius:3px; padding:3px; margin-bottom:14px; }
  .tabbar button{
    flex:1; border:none; background:none; padding:9px 4px; font-size:13px; font-weight:600;
    color:var(--ink-soft); border-radius:2px; cursor:pointer; font-family:'IBM Plex Sans',sans-serif;
  }
  .tabbar button.active{ background:var(--accent); color:#fff; }

  .view{ display:none; }
  .view.active{ display:block; }

  /* --- day view --- */
  .daynav{ display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--border); border-radius:3px; padding:10px 12px; margin-bottom:12px; }
  .queue-toggle{ display:flex; gap:8px; margin-bottom:10px; }
  .qt-btn{
    flex:1; border:1.5px solid var(--border); background:var(--card); color:var(--ink-soft);
    border-radius:3px; padding:12px 8px; font-size:13px; font-weight:700; cursor:pointer;
    font-family:'IBM Plex Sans',sans-serif; display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .qt-btn .mono{ font-size:11.5px; opacity:.85; }
  .qt-btn.active{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .substatus-row{ margin-bottom:12px; }
  .substatus-row .status-select{ width:100%; }
  .daynav button.arrow{ width:34px; height:34px; border-radius:3px; border:1px solid var(--border); background:#fff; color:var(--ink); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .daynav button.arrow:active{ background:var(--bg); }
  .daynav .center{ flex:1; text-align:center; }
  .daynav .daylabel{ font-weight:700; font-size:14px; font-family:'Fraunces',serif; }
  .daynav .datelabel{ font-size:11.5px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace; margin-top:1px;}
  .daynav .today-btn{ font-size:11px; font-family:'IBM Plex Mono',monospace; color:var(--accent); background:var(--accent-soft); border:1px solid var(--accent); border-radius:3px; padding:6px 8px; cursor:pointer; font-weight:600; flex-shrink:0; }

  .progress-wrap{ background:var(--card); border:1px solid var(--border); border-radius:3px; padding:12px 14px; margin-bottom:14px; }
  .progress-row{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:7px;}
  .progress-row .label{ font-size:12.5px; color:var(--ink-soft); }
  .progress-row .count{ font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:13px; }
  .bar{ height:6px; background:var(--bg); border-radius:3px; overflow:hidden; }
  .bar-fill{ height:100%; background:var(--accent); border-radius:3px; transition:width .3s ease; }
  .day-jump{ display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace; margin-top:6px; }
  .day-jump input{ width:52px; border:1px solid var(--border); border-radius:3px; padding:4px 6px; font-family:'IBM Plex Mono',monospace; font-size:12px; text-align:center; }

  .cards{ display:flex; flex-direction:column; gap:12px; }
  .card{ position:relative; background:var(--card); border:1px solid var(--border); border-radius:4px; padding:14px 14px 12px; overflow:hidden; border-left:3px solid var(--accent); }
  .card.card-dim{ opacity:.55; border-left-color:var(--gray); }
  .card-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:8px;}
  .seller{ font-weight:600; font-size:15px; line-height:1.3; font-family:'Fraunces',serif; }
  .meta{ font-size:12px; color:var(--ink-soft); margin-top:2px; }
  .views{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); background:var(--bg); border-radius:3px; padding:3px 7px; white-space:nowrap; flex-shrink:0; border:1px solid var(--border); }
  .offer-tag{ display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--accent); background:var(--accent-soft); padding:3px 8px; border-radius:3px; font-weight:600; margin-bottom:10px; letter-spacing:.02em; border:1px solid var(--accent); }
  .btn-row{ display:flex; gap:8px; margin-top:2px; }
  .btn{ flex:1; text-align:center; text-decoration:none; border:none; cursor:pointer; border-radius:3px; padding:10px 8px; font-size:13px; font-weight:600; font-family:'IBM Plex Sans',sans-serif; display:flex; align-items:center; justify-content:center; gap:5px; }
  .btn-open{ background:var(--accent); color:#fff; }
  .btn-open:active{ opacity:.85; }
  .btn-copy{ background:var(--bg); color:var(--ink); border:1px solid var(--border); }
  .btn-copy:active{ background:#e4e6dc; }

  .texttype-row{ display:flex; gap:8px; margin-top:10px; }
  select.texttype-select{
    flex:1.3; appearance:none; -webkit-appearance:none; border-radius:3px; border:1.5px solid var(--border);
    padding:9px 30px 9px 10px; font-size:12.5px; font-weight:600; font-family:'IBM Plex Sans',sans-serif;
    background:#fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path d="M0 0l5 6 5-6z" fill="%2356695F"/></svg>') no-repeat right 10px center;
    color:var(--ink);
  }
  .btn-copytext{ flex:1; background:var(--accent); color:#fff; border:none; border-radius:3px; padding:9px 8px; font-size:12.5px; font-weight:700; cursor:pointer; font-family:'IBM Plex Sans',sans-serif; }
  .btn-copytext:active{ opacity:.85; }

  .script-step{ border-top:1px dashed var(--border); padding:12px 0; font-size:13px; line-height:1.5; }
  .script-step .ss-label{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--purple); font-weight:700; margin-bottom:5px; text-transform:uppercase; letter-spacing:.03em; }
  .script-step .oi-copy{ margin-top:8px; font-size:12px; background:var(--bg); border:1px solid var(--border); border-radius:3px; padding:6px 10px; cursor:pointer; font-family:'IBM Plex Sans',sans-serif; font-weight:600; }
  .ref-subhead{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--ink-soft); font-weight:700; text-transform:uppercase; letter-spacing:.04em; padding-top:12px; }

  .status-row{ display:flex; gap:8px; margin-top:10px; }
  select.status-select{
    flex:1; appearance:none; -webkit-appearance:none; border-radius:3px; border:1.5px solid var(--border);
    padding:9px 30px 9px 10px; font-size:13px; font-weight:600; font-family:'IBM Plex Sans',sans-serif;
    background:#fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path d="M0 0l5 6 5-6z" fill="%2356695F"/></svg>') no-repeat right 10px center;
    color:var(--ink);
  }
  input.note-input{
    width:100%; margin-top:8px; border:1px solid var(--border); border-radius:3px; padding:9px 10px;
    font-size:12.5px; font-family:'IBM Plex Sans',sans-serif; color:var(--ink);
  }
  .updated-note{ font-size:10.5px; color:var(--ink-soft); margin-top:5px; font-family:'IBM Plex Mono',monospace;}

  .stamp{
    position:absolute; top:10px; right:10px; transform:rotate(-10deg);
    width:64px; height:64px; border-radius:50%;
    border:2px solid var(--stamp); color:var(--stamp);
    font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:9.5px; letter-spacing:.03em;
    display:flex; align-items:center; justify-content:center; text-align:center;
    background:rgba(255,255,255,.9); pointer-events:none; line-height:1.15; padding:4px;
  }
  .stamp::before{
    content:''; position:absolute; inset:4px; border:1px solid var(--stamp); border-radius:50%; opacity:.55;
  }

  .empty{ text-align:center; padding:50px 20px; color:var(--ink-soft); background:var(--card); border:1px solid var(--border); border-radius:4px; }
  .empty .big{ font-size:34px; margin-bottom:8px; }

  details.offers-ref{ margin-top:18px; background:var(--card); border:1px solid var(--border); border-radius:3px; padding:2px 14px; }
  details.offers-ref summary{ cursor:pointer; padding:12px 0; font-weight:600; font-size:13.5px; list-style:none; display:flex; justify-content:space-between; align-items:center; font-family:'Fraunces',serif; }
  details.offers-ref summary::-webkit-details-marker{ display:none; }
  .offer-item{ border-top:1px dashed var(--border); padding:12px 0; font-size:13px; line-height:1.5; }
  .offer-item .oi-label{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--accent); font-weight:700; margin-bottom:5px; }
  .offer-item .oi-copy{ margin-top:8px; font-size:12px; background:var(--bg); border:1px solid var(--border); border-radius:3px; padding:6px 10px; cursor:pointer; font-family:'IBM Plex Sans',sans-serif; font-weight:600; }

  .toast{ position:fixed; left:50%; bottom:22px; transform:translate(-50%, 20px); background:var(--ink); color:#fff; padding:10px 18px; border-radius:4px; font-size:13px; opacity:0; transition:all .25s ease; pointer-events:none; z-index:50; font-weight:500; }
  .toast.show{ opacity:1; transform:translate(-50%,0); }

  /* --- CRM view --- */
  .search-wrap{ margin-bottom:10px; }
  input.search-input{
    width:100%; border:1px solid var(--border); border-radius:3px; padding:11px 14px; font-size:13.5px;
    font-family:'IBM Plex Sans',sans-serif; background:var(--card);
  }
  .chips{ display:flex; gap:6px; overflow-x:auto; padding-bottom:8px; margin-bottom:10px; -webkit-overflow-scrolling:touch; }
  .chips::-webkit-scrollbar{ display:none; }
  .chip{
    flex-shrink:0; font-size:12px; font-weight:600; padding:7px 12px; border-radius:20px; border:1.5px solid var(--border);
    background:var(--card); color:var(--ink-soft); cursor:pointer; white-space:nowrap; font-family:'IBM Plex Sans',sans-serif;
  }
  .chip.active{ background:var(--ink); border-color:var(--ink); color:#fff; }

  .crm-list{ display:flex; flex-direction:column; gap:8px; }
  details.crm-row{ background:var(--card); border:1px solid var(--border); border-radius:3px; overflow:hidden; }
  details.crm-row summary{
    list-style:none; padding:12px 14px; cursor:pointer; display:flex; align-items:center; gap:10px;
  }
  details.crm-row summary::-webkit-details-marker{ display:none; }
  .dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .crm-row-main{ flex:1; min-width:0; }
  .crm-row-seller{ font-weight:600; font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-family:'Fraunces',serif; }
  .crm-row-meta{ font-size:11.5px; color:var(--ink-soft); margin-top:1px; }
  .crm-row-badge{
    font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:700; padding:3px 8px; border-radius:3px; flex-shrink:0;
  }
  .crm-detail{ padding:0 14px 14px; border-top:1px dashed var(--border); padding-top:12px; }

  .status-dot-new{ background:var(--gray); }
  .status-dot-sent{ background:var(--accent); }
  .status-dot-replied{ background:var(--amber); }
  .status-dot-negotiating{ background:var(--purple); }
  .status-dot-won{ background:var(--good); }
  .status-dot-lost{ background:var(--gray); }
  .status-dot-irrelevant{ background:var(--stamp); }

  .badge-new{ background:var(--gray-soft); color:var(--gray); }
  .badge-sent{ background:var(--accent-soft); color:var(--accent); }
  .badge-replied{ background:var(--amber-soft); color:var(--amber); }
  .badge-negotiating{ background:var(--purple-soft); color:var(--purple); }
  .badge-won{ background:var(--good-soft); color:var(--good); }
  .badge-lost{ background:var(--gray-soft); color:var(--gray); }
  .badge-irrelevant{ background:#F5E4E2; color:var(--stamp); }

  .crm-empty{ text-align:center; padding:40px 20px; color:var(--ink-soft); font-size:13px; }
</style>

  negotiating: { label: 'Переговоры',   short: 'ПЕРЕГОВОРЫ',     badge:'badge-negotiating' },
  won:         { label: 'Договорились', short: 'ДОГОВОРИЛИСЬ',   badge:'badge-won' },
  lost:        { label: 'Отказ',        short: 'ОТКАЗ',          badge:'badge-lost' },
  irrelevant:  { label: 'Отмена',       short: 'НЕ РЕЛЕВАНТНО',  badge:'badge-irrelevant' },
};
const STATUS_ORDER = ['new','sent','replied','negotiating','won','lost','irrelevant'];
const ACTIVE_STATUSES = ['sent','replied','negotiating'];   // бакет «Отправлено» — в работе
const RESOLVED_STATUSES = ['won','lost','irrelevant'];       // бакет «Остальные» — закрыто
const STATUS_TO_BUCKET = { new:'new', sent:'sent', replied:'sent', negotiating:'sent', won:'other', lost:'other', irrelevant:'other' };

let statusMap = {};
let currentTab = 'day';
let activeFilter = 'all';
let searchTerm = '';
let queueMode = 'new';         // 'new' | 'sent' | 'other'
let queueStatusFilter = 'all'; // 'all' or a specific status key — overrides bucket highlighting
function clamp(n, lo, hi){ return Math.max(lo, Math.min(hi, n)); }
function timeAgo(iso){
  if(!iso) return '';
  const diffMs = Date.now() - new Date(iso).getTime();
  const days = Math.floor(diffMs / 86400000);
  if(days <= 0) return 'сегодня';
  if(days === 1) return 'вчера';
  return `${days} дн. назад`;
}
function getEntry(id){
  const raw = statusMap[id];
  if(!raw) return { status:'new', note:'', updatedAt:null };
  if(typeof raw === 'string') return { status:'sent', note:'', updatedAt: raw };
  return { status: raw.status || 'new', note: raw.note || '', updatedAt: raw.updatedAt || null };
}
function setEntry(id, patch, touchUpdatedAt = true){
  const cur = getEntry(id);
  const next = { ...cur, ...patch };
  if(touchUpdatedAt) next.updatedAt = new Date().toISOString();
  if(next.status === 'new' && !next.note){ delete statusMap[id]; }
  else statusMap[id] = next;
  saveStatus();
}

async function loadStatus(){
  try{ const res = await window.storage.get(STORAGE_KEY, false); if(res && res.value) statusMap = JSON.parse(res.value); }
  catch(e){ statusMap = {}; }
}
async function saveStatus(){
  try{ await window.storage.set(STORAGE_KEY, JSON.stringify(statusMap), false); }catch(e){}
}

function showToast(msg){
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1400);
}
function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast('Текст скопирован')).catch(()=>fallbackCopy(text));
  } else fallbackCopy(text);
}
function fallbackCopy(text){
  const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); showToast('Текст скопирован'); }catch(e){}
  document.body.removeChild(ta);
}

function statusOptionsHTML(selected){
  return STATUS_ORDER.map(s => `<option value="${s}" ${s===selected?'selected':''}>${STATUS_META[s].label}</option>`).join('');
}

function renderOverallBadge(){
  const newCount = DATA.filter(d => getEntry(d.id).status === 'new').length;
  const sentCount = DATA.filter(d => ACTIVE_STATUSES.includes(getEntry(d.id).status)).length;
  const otherCount = DATA.filter(d => RESOLVED_STATUSES.includes(getEntry(d.id).status)).length;
  const elNew = document.getElementById('qtNewCount');
  const elSent = document.getElementById('qtSentCount');
  const elOther = document.getElementById('qtOtherCount');
  if(elNew) elNew.textContent = newCount;
  if(elSent) elSent.textContent = sentCount;
  if(elOther) elOther.textContent = otherCount;
}

/* ---------- QUEUE VIEW ---------- */
const STATUS_RANK = { sent:0, replied:0, negotiating:0, won:1, lost:1, irrelevant:1 };

function renderQueue(){
  let items;
  if(queueStatusFilter !== 'all'){
    items = DATA.filter(d => getEntry(d.id).status === queueStatusFilter);
  } else if(queueMode === 'new'){
    items = DATA.filter(d => getEntry(d.id).status === 'new');
  } else if(queueMode === 'sent'){
    items = DATA.filter(d => ACTIVE_STATUSES.includes(getEntry(d.id).status));
  } else {
    items = DATA.filter(d => RESOLVED_STATUSES.includes(getEntry(d.id).status));
  }

  if(queueMode !== 'new'){
    items = items.slice().sort((a, b) => {
      const ea = getEntry(a.id), eb = getEntry(b.id);
      const ra = STATUS_RANK[ea.status] ?? 0, rb = STATUS_RANK[eb.status] ?? 0;
      if(ra !== rb) return ra - rb;
      const ta = ea.updatedAt ? new Date(ea.updatedAt).getTime() : 0;
      const tb = eb.updatedAt ? new Date(eb.updatedAt).getTime() : 0;
      return tb - ta;
    });
  }

  document.getElementById('qtNew').classList.toggle('active', queueMode==='new');
  document.getElementById('qtSent').classList.toggle('active', queueMode==='sent');
  document.getElementById('qtOther').classList.toggle('active', queueMode==='other');

  const cardsEl = document.getElementById('cards');
  const emptyEl = document.getElementById('emptyState');
  cardsEl.innerHTML = '';

  if(items.length === 0){
    emptyEl.style.display = 'block';
  } else {
    emptyEl.style.display = 'none';
    items.forEach(item => {
      const entry = getEntry(item.id);
      const meta = STATUS_META[entry.status];
      const card = document.createElement('div');
      card.className = 'card' + (RESOLVED_STATUSES.includes(entry.status) ? ' card-dim' : '');
      const metaParts = [item.city || item.region].filter(Boolean);
      if(item.contact) metaParts.push(item.contact);
      card.innerHTML = `
        ${meta.short ? `<div class="stamp">${meta.short}</div>` : ''}
        <div class="card-top">
          <div>
            <div class="seller">${item.seller || 'Без имени'}</div>
            <div class="meta">${metaParts.join(' · ')}</div>
          </div>
          <div class="views">👁 ${item.views.toLocaleString('ru-RU')}</div>
        </div>
        <div class="offer-tag">ОФФЕР №${item.offerIdx + 1}</div>
        <div class="btn-row">
          <a class="btn btn-open" href="${item.link}" target="_blank" rel="noopener">Объявление ↗</a>
        </div>
        <div class="texttype-row">
          <select class="texttype-select" data-id="${item.id}" data-offer="${item.offerIdx}" data-seg="${item.seg}">${textTypeOptionsHTML()}</select>
          <button class="btn-copytext" data-id="${item.id}" data-offer="${item.offerIdx}" data-seg="${item.seg}">Копировать</button>
        </div>
        <div class="status-row">
          <select class="status-select" data-id="${item.id}">${statusOptionsHTML(entry.status)}</select>
        </div>
        <input type="text" class="note-input" data-id="${item.id}" placeholder="Заметка (необязательно)" value="${entry.note.replace(/"/g,'&quot;')}">
        ${entry.updatedAt ? `<div class="updated-note">обновлено: ${timeAgo(entry.updatedAt)}</div>` : ''}
      `;
      cardsEl.appendChild(card);
    });
  }

  renderOverallBadge();

  cardsEl.querySelectorAll('.btn-copytext').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const sel = cardsEl.querySelector(`.texttype-select[data-id="${btn.getAttribute('data-id')}"]`);
      const offerIdx = parseInt(btn.getAttribute('data-offer'));
      const seg = parseInt(btn.getAttribute('data-seg'));
      copyText(textForType(sel.value, seg, offerIdx));
    });
  });
  cardsEl.querySelectorAll('.status-select').forEach(sel=>{
    sel.addEventListener('change', ()=>{ setEntry(sel.getAttribute('data-id'), { status: sel.value }); renderQueue(); if(currentTab==='crm') renderCRM(); });
  });
  cardsEl.querySelectorAll('.note-input').forEach(inp=>{
    inp.addEventListener('change', ()=>{ setEntry(inp.getAttribute('data-id'), { note: inp.value }); renderOverallBadge(); });
  });
}

function textTypeOptionsHTML(){
  return `<option value="offer">Оффер (по сегменту)</option><option value="hook">Крючок</option>`;
}
function textForType(typeKey, seg, offerIdx){
  if(typeKey === 'hook'){
    return HOOKS[offerIdx % HOOKS.length];
  }
  const list = OFFERS_BY_SEG[seg] || OFFERS_BY_SEG[2];
  return list[offerIdx % list.length];
}

function renderOffersRef(){
  const el = document.getElementById('offersRef');
  let html = '';
  [1,2,3,4].forEach(seg => {
    html += `<div class="ref-subhead">${SEG_LABEL[seg]}</div>`;
    html += OFFERS_BY_SEG[seg].map((text, i) => `
      <div class="offer-item">
        <div class="oi-label">№${i+1}</div>
        <div>${text}</div>
        <button class="oi-copy" data-seg="${seg}" data-idx="${i}" data-type="offer">Копировать</button>
      </div>
    `).join('');
  });
  html += `<div class="ref-subhead">Крючок (общий)</div>`;
  html += HOOKS.map((text, i) => `
    <div class="offer-item">
      <div class="oi-label">№${i+1}</div>
      <div>${text}</div>
      <button class="oi-copy" data-seg="0" data-idx="${i}" data-type="hook">Копировать</button>
    </div>
  `).join('');
  el.innerHTML = html;
  el.querySelectorAll('.oi-copy').forEach(btn=>{
    btn.addEventListener('click', ()=> copyText(textForType(btn.getAttribute('data-type'), parseInt(btn.getAttribute('data-seg')), parseInt(btn.getAttribute('data-idx')))));
  });
}

function renderMsgScript(){
  const el = document.getElementById('msgScriptRef');
  el.innerHTML = MSG_SCRIPT.map(step => `
    <div class="script-step">
      <div class="ss-label">${step.label}</div>
      <div>${step.text}</div>
      <button class="oi-copy" data-text="${encodeURIComponent(step.text)}">Копировать</button>
    </div>
  `).join('');
  el.querySelectorAll('.oi-copy').forEach(btn=>{
    btn.addEventListener('click', ()=> copyText(decodeURIComponent(btn.getAttribute('data-text'))));
  });
}

/* ---------- CRM VIEW ---------- */
function computeCounts(){
  const counts = { all: DATA.length, new:0, sent:0, replied:0, negotiating:0, won:0, lost:0, irrelevant:0 };
  DATA.forEach(item => { counts[getEntry(item.id).status]++; });
  return counts;
}

function renderChips(){
  const counts = computeCounts();
  const chipsEl = document.getElementById('chips');
  const defs = [
    ['all','Все'], ['replied','Ответил'], ['negotiating','Переговоры'], ['won','Договорились'],
    ['sent','Написано'], ['new','Не написано'], ['lost','Отказ'], ['irrelevant','Отмена']
  ];
  chipsEl.innerHTML = defs.map(([key,label]) => `
    <button class="chip ${activeFilter===key?'active':''}" data-key="${key}">${label} (${counts[key]})</button>
  `).join('');
  chipsEl.querySelectorAll('.chip').forEach(ch=>{
    ch.addEventListener('click', ()=>{ activeFilter = ch.getAttribute('data-key'); renderCRM(); });
  });
}

function renderCRM(){
  renderChips();
  const term = searchTerm.trim().toLowerCase();
  let items = DATA.filter(item => {
    const entry = getEntry(item.id);
    if(activeFilter !== 'all' && entry.status !== activeFilter) return false;
    if(term){
      const hay = `${item.seller} ${item.city} ${item.region}`.toLowerCase();
      if(!hay.includes(term)) return false;
    }
    return true;
  });
  items = items.slice().sort((a,b) => a.day - b.day);

  const listEl = document.getElementById('crmList');
  const emptyEl = document.getElementById('crmEmpty');
  listEl.innerHTML = '';

  if(items.length === 0){ emptyEl.style.display = 'block'; return; }
  emptyEl.style.display = 'none';

  items.forEach(item => {
    const entry = getEntry(item.id);
    const meta = STATUS_META[entry.status];
    const det = document.createElement('details');
    det.className = 'crm-row';
    const metaParts = [`День ${item.day}`, item.city || item.region].filter(Boolean);
    det.innerHTML = `
      <summary>
        <div class="dot status-dot-${entry.status}"></div>
        <div class="crm-row-main">
          <div class="crm-row-seller">${item.seller || 'Без имени'}</div>
          <div class="crm-row-meta">${metaParts.join(' · ')}${entry.updatedAt ? ' · ' + timeAgo(entry.updatedAt) : ''}</div>
        </div>
        <div class="crm-row-badge ${meta.badge}">${entry.status==='new' ? '—' : meta.label.toUpperCase()}</div>
      </summary>
      <div class="crm-detail">
        <div class="offer-tag">ОФФЕР №${item.offerIdx + 1}</div>
        <div class="btn-row">
          <a class="btn btn-open" href="${item.link}" target="_blank" rel="noopener">Объявление ↗</a>
        </div>
        <div class="texttype-row">
          <select class="texttype-select" data-id="${item.id}" data-offer="${item.offerIdx}" data-seg="${item.seg}">${textTypeOptionsHTML()}</select>
          <button class="btn-copytext" data-id="${item.id}" data-offer="${item.offerIdx}" data-seg="${item.seg}">Копировать</button>
        </div>
        <div class="status-row">
          <select class="status-select" data-id="${item.id}">${statusOptionsHTML(entry.status)}</select>
        </div>
        <input type="text" class="note-input" data-id="${item.id}" placeholder="Заметка (необязательно)" value="${entry.note.replace(/"/g,'&quot;')}">
      </div>
    `;
    listEl.appendChild(det);
  });

  listEl.querySelectorAll('.btn-copytext').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.preventDefault();
      const sel = listEl.querySelector(`.texttype-select[data-id="${btn.getAttribute('data-id')}"]`);
      const offerIdx = parseInt(btn.getAttribute('data-offer'));
      const seg = parseInt(btn.getAttribute('data-seg'));
      copyText(textForType(sel.value, seg, offerIdx));
    });
  });
  listEl.querySelectorAll('.texttype-select').forEach(sel=>{
    sel.addEventListener('click', e=>e.stopPropagation());
  });
  listEl.querySelectorAll('.status-select').forEach(sel=>{
    sel.addEventListener('click', e=>e.stopPropagation());
    sel.addEventListener('change', ()=>{ setEntry(sel.getAttribute('data-id'), { status: sel.value }); renderCRM(); renderOverallBadge(); });
  });
  listEl.querySelectorAll('.note-input').forEach(inp=>{
    inp.addEventListener('click', e=>e.stopPropagation());
    inp.addEventListener('change', ()=>{ setEntry(inp.getAttribute('data-id'), { note: inp.value }); });
  });
}

/* ---------- NAV / INIT ---------- */
document.querySelectorAll('.tabbar button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    currentTab = btn.getAttribute('data-tab');
    document.querySelectorAll('.tabbar button').forEach(b=>b.classList.toggle('active', b===btn));
    document.getElementById('view-day').classList.toggle('active', currentTab==='day');
    document.getElementById('view-crm').classList.toggle('active', currentTab==='crm');
    if(currentTab==='crm') renderCRM();
    else renderQueue();
  });
});

document.getElementById('qtNew').addEventListener('click', ()=>{ queueMode = 'new'; queueStatusFilter = 'all'; document.getElementById('substatusSelect').value = 'all'; renderQueue(); });
document.getElementById('qtSent').addEventListener('click', ()=>{ queueMode = 'sent'; queueStatusFilter = 'all'; document.getElementById('substatusSelect').value = 'all'; renderQueue(); });
document.getElementById('qtOther').addEventListener('click', ()=>{ queueMode = 'other'; queueStatusFilter = 'all'; document.getElementById('substatusSelect').value = 'all'; renderQueue(); });
document.getElementById('substatusSelect').addEventListener('change', (e)=>{
  const val = e.target.value;
  queueStatusFilter = val;
  if(val !== 'all') queueMode = STATUS_TO_BUCKET[val];
  renderQueue();
});
document.getElementById('searchInput').addEventListener('input', (e)=>{ searchTerm = e.target.value; renderCRM(); });

(async function init(){
  await loadStatus();
  renderQueue();
  renderOffersRef();
  renderMsgScript();
  renderOverallBadge();
})();
</script>
</body>
</html>
